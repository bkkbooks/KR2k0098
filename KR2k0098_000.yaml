body:
  text: 武林梵志地理類七古蹟之屬提要臣等謹案武林梵志十二巻明呉之鯨撰之鯨字伯裔錢塘人與呉大山稱江皋二俊萬厯中舉於鄉數上春官不第謁選得浮梁知縣卒於官是編以杭州梵刹盛於南宋至明而殘廢者多恐遺蹟漸湮乃博考乗牒分城内城外南山北山及諸屬縣凡得寺院四百二十六所俱詳誌創置始末及其山川形勝後為天朝寵錫宰官䕶持古徳機縁厯代勲績四門分紀名流勝蹟髙僧支派各編小傳序録井然頗有條理其中採輯宋元人詩文如仙林崇先二寺記見曹勛松隠集智果寺記見徐一蘷始興集而志俱失載不免稍有漏脫又如宋張敦禮捨鐘者非杭之法雲寺而以名同誤入又撰法相寺碑記者前作范楷後作沈楷亦為參錯失檢然搜剔幽隠無㣲不至實多武林舊事西湖逰覽志所未載如明逺堂詩次於蘇軾諸作之後而東坡集無之張九成喻彌陀塔銘亦不見於横浦集張伯雨天池樓詩與本集互異可以參攷遺文軼事俱足為談藝之資正不徒為伽藍増故實也乾隆四十五年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:eb8af01de1f4a1047fd6b8cac1015e318ddddd16126c708709ab1a2da44beb1f
