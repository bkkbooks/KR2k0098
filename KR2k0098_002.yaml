幽棲况對求羊偶且向山中閲歲華寺後有幻居即幻居禪師塔有御祭亭有像宣徳庚戍楊復撰碑銘大化氤氲實生異人髫齔有志超拔莫羣誰當其師曷逾迦文矢出於世肻混於塵飛空則龍瑞世必麟壯逢宗匠逈脱迷津青氷不忝師道仍殷權實兼妙機用惟均幻見其居漚浮其身闡猷大慈廕物如雲起廢中竺嘉聲四聞繼登兩街天子日親坐承清問法要𢎞陳化度無外塵刹垂勛晚主靈谷聖眷尤勤褒進慧濟實惟徳尊錫衣之金分膳之珍道價以倍寒堂亦春二公讓席四夷歸仁孰謂季運轉此法輪涅槃為果般若為因見塔無縫乃知師真襲慶禪寺俗呼真珠寺舊名薦福院在樵歌嶺晉開運間吳越王建為清鑑禪師道塲周顯徳間殿中宫震位忽泉涌成渠擊磬則泉汎如貫珠宋景祐中名真珠泉至開慶元年賜額襲慶寺洪武壬申復建賜今額𢎞治十五年重建萬厯庚子僧徳昭重修六和塔在月輪峯傍宋開寶三年智覺禪師建先是梁開平五年吳越王於仁王廢院掘地得大錢以為瑞應因建大錢寺設寶幢二座於寺門入宋寺廢智覺禪師乃即錢氏南果園建塔以鎮江潮高九級五十餘丈撑空兀突跨陸俯川海船夜泛者以塔燈為指南焉宣和中燬於方臘之亂紹興二十二年僧智曇募縁重建七級而止塔中有湯思退等彚冩佛説四十二章經李伯時石刻觀音像嘉靖三年燬塔下為龍山渡魚山渡隔岸剡中諸山歴歴可數塔之北為毛湫峪宋紹興間塔成萬厯間祩宏重修曹勛記畧云浙江介於吳越一晝一夜濤頭自海而上者再疾擊而逺馳虎駭而龍怒猛如山立歘如電轉掠隄突岸摧䧟田廬為臨安患乆矣㝠㝠中若有神物典司其事錢氏有吳越時曽以萬弩射潮頭終不能却其勢後有僧智覺禪師延壽同僧綂賛寧創建斯塔用以為鎮自是潮習故道居民徳之宣和三禩塔寺俱燬赤地無遺而潮復為患紹興壬申天子憂之思所以制其害者在廷之臣首以復興斯塔為請詔賜可下有司計度庀工治材守臣擇可主持斯事者得僧智曇諭以詔㫖曇口諾心然願以身任不煩官府乃勤渠化募而和義郡王楊存中居士董仲永首倡損貲於是蓮社樂施雲臻霧集雖逺在他路亦荷擔而來自癸酉仲春鳩工至癸未之春五層告成是年歲晚則七級就緒巍然掲立光動山海環壁刻金剛經及塑雜花五十三善知識備盡莊嚴凡所以鎮靜山川䕶持法界調伏魔境者莫不閡而存焉塔興之初土石未及百簣而潮勢已殺既成之後化為安流而瀕江之民恬不驚悸此則塔之為功而智曇之植福也白廷玉同陳太博諸公登六和塔詩云龍山古化城浮屠峙其巔開殿生妙香捫壁森貝筵應真儼若生倒飛青金蓮頭陀紺林叢道我丹梯縁初猶藉佛日閟境儵已𤣥囘頭失誰何呌嘯衣相牽且復忍須㬰當見快意天嬌兒詫先登網戸相鈎連炯若蟻在珠九曲隨盤旋爛爛滄海開落落雲氣懸羣峰可俯拾背閲黄鶴騫竒觀興懦夫便欲凌飛仙絶頂按坤維始見南紀偏神京𣺌何許王氣停須躔舟車集百蠻島嶼通人烟一為帝王州氣壓三大千剛風灑毛髪鐸語空蝉聨紅放杏園花媿乏慈恩篇張仲舉登塔詩江上浮屠快一登里中烟火是西興日生滄海横流外人立青溟最上層潮落逺沙羣下鴈樹欹高壁獨巢鷹百年等是豪華盡怕聽興亡懶問僧孫晉登塔詩闌檻倚雲漢身疑出上方乾坤一指顧吳越兩興亡海接空江白山分落日黄伍胥遺恨在秋草隔沙長東坡六和寺送張吉甫赴閩曹詩羡君超然鸞鳯姿江湖欲下還飛去空使吳兒怨不留青山澷澷七閩路門前江水去掀天寺後清池碧玉環君如大江日千里我如此水千山底開化寺即塔院也宋隆興二年建嘉靖十二年與塔俱火傍有金魚池噴月泉持正泉秀江亭鐵井欄刻八卦以鎮水怪僧仲殊登秀江亭南柯子詞云金梵蟠龍尾蓮開舞鳯頭涼生宫殿不因秋門外莫尋塵世捲地江流霽色澄千里潮聲帶兩州月華清泛浪花浮今夜蓬萊歸夢十二瓊樓左塢有月輪菴朝陽菴在六和塔左進龍浦右近江小塢僧雲天明証建内有大石佛禪定處五雲山真際院山最高約百丈許周十五里五峰森列駕軼雲霞盤曲而上凡七十二灣俯視南北兩峯若雙錐朋立長江帶繞西湖鑑開㠶檣隱見煙霧間若鷗鳬出没宋時每歲臘前寺僧捧雪表黎明入城中霰猶未集盖其地特高寒云周顯徳丙辰志逢禪師結茅開山師天台韶國嗣吳越王極尊禮之每攜大扇乞錢買肉飼虎虎迎載還山大將凌超創華嚴道塲名静慮菴延師主席宋乾徳間吳越王召賜紫衣賜額真際院諡普覺國初燬正徳十二年僧法堅重建寺内伽藍乃華光藏神杭人宰牲祈財無虚日有天井大旱不竭伏虎亭端敬亭五雲端亭方伯范淶憲副陳經濟建錢思復登五雲山詩普覺遺衣乆不傳五雲故色尚蒼然斷崖蘿薜三千丈喬木風霜四百年龍井雨深泉獨響漁村潮上月初圓寶坊金碧紅塵聚何似兹山更絶縁林景初金日新㑹宿五雲山詩山氣清如水林扉夜不扄月明苔徑白松暗水螢青幽蕙臨風辨孤泉過石聽何當凌絶頂萬里極滄溟雲棲寺在梵村天柱寺旁禪師祩宏伐茅建菴於此為逺近宗仰後掘地有碑即古雲棲寺也陶望齡董其昌有記祩宏自為記云杭府治南連大江西引明聖二湖萬山繞湖而絡繹江滸遡江西上行三十餘里山名五雲先是山巔有五色瑞雲盤旋其上因以名山已而五雲飛集山西塢中經乆不散時人異之號為雲棲塢宋乾徳五年有僧結菴以居塢多虎僧至虎輙馴伏世稱伏虎禪師者是也吳越王錢氏為之建寺而雲棲於是創始矣禪師一號大扇和尚諱志逢初築室五雲之頂天禧中䧏勅賜真際院遂并闢雲棲天池二院而成三刹後治平二年改號棲真今曰雲棲者復古也雲棲居五雲之西徑曲林幽四山圍合蒼翠聳然東岡而上有壁觀峯峯下有泉名青龍泉迤邐下中峯之旁復出一泉名聖義泉又下而西崗之麓復出一泉名金液泉筧引涓涓潔冽甘芳汲灌不竭獨以荒僻寥落人跡罕至非忘形死心者莫能居焉紹興初有余知閣者扈蹕南渡隱於寺側後捨宅歸寺聖朝𢎞治七年霖雨發洪廬宇經像隨水漂蕩僧稍稍散去頽耋者僦居民房而故院遂蓁莽父老過之傷感垂涕衛將軍玉溪楊公暨子念堂君雅嚮三寶時募僧重修而頻苦虎患居無何即引去隆慶五年祩宏行脚南還愛其岑寂孤形隻鉢趺坐圮壁間太學生陳如玉李繡等為之構靜室三楹而宏晝與野鹿主賔夜與鳴泉倡和悠然若將終身村之民怪其能乆居也環村四十里嵗傷於虎者不下二十人而雞犬不與焉宏乃發悲懇諷經千巻設瑜伽施食津濟之自是虎不傷人適歲亢旱禱於山偶時雨霔村之民又大悦而慶其得安居也相與纍纍然肩材木而至曰兹吾祖所植也荷鋤钁發其塵坌之礎磉而指之曰兹雲棲寺之故物也禪師福吾村吾願鼎新寺之遺址以永吾一境之香火由是百日而成蘭若外無崇門中無大殿惟禪堂處僧法堂以奉經律而已宏自惟迂踈陋劣寸長無稱抱病入山分與草木同腐頃值幻縁興此廢墜惡容坐食不思所以上報佛恩而下酬檀信乎顧生平尚真實而賤浮誇甘窮約而羞名利因共二三同志相砥礪力行古道盟而後進犯而必退大都主之以淨土而冬専坐禪餘兼講誦日有程月有稽歲有表凛凛乎使無賴者不得叅乎其間雖於法門無大禆益庶幾勅末學之弊以俟後之知識云爾宏沈氏子字佛慧號蓮池仁和人是為記董其昌記并書杭之山自天目來帶苕水挾聖湖南盡於江折而東是為鳯凰諸山宋之故宫在焉遡流而西二十里是為五雲山循山麓而西四五里是為雲棲寺則今蓮池禪師之道塲也陂陀坻平巖谷幽密劃然野處而不與湖山為羣境則變喧而幽土則去穢而淨一似遺世者山當江之三折海門濤頭雪湧而霆擊者至此蕩為平川洋洋瀰瀰怒氣消盡一似忍辱者由東岡而上有壁觀峯青龍泉出焉中峯之旁復出一泉名曰聖義泉西岡之下復出一泉名曰金液泉涓涓甘冽汲灌不竭一似利生者此非有道者莫能居而居之者亦於道力有助自宋伏虎禪師住山以至國朝雖天禧中稍闢為寺而逓興逓廢夷為蓁莽乆矣師以隆慶五年托鉢此村若有㝠契曰吾骨人得骨山可以老矣縛茆三楹經禪宴坐有終焉之志環村四十里數有虎倀師以慈止殺虎不為暴歲旱禱雨雨澤輙應魃不為灾居人異之爭來作室度材於家山仍礎於故址民大和㑹焉師曰毘盧宫殿偏界偏空草昧經營無勤檀施唯法堂奉經律禪堂以處僧兹所急也既落成而百年廢刹遂復舊觀矣此雲棲之縁起也師之侍者以為古德破荒衆信積力不可泯没請余記之余何知出世事而竊有感於法道盛衰之際也在昔唐宋時士惟薄將相不為者始去而為大僧以了百千億刼之生死故其成行之嚴宗風之峻直可感鬼神馴異類或為道俗所皈依或為帝王所禮敬名藍淨刹於是繁興矣盖其盛也近以經術收儁士士所不收者方自引而食於僧是以赤縣神州列刹相望圓頂方袍聚廬而處者百十為輩即而求之所謂禪講律師如古尊宿者有幾假令大年削牘寂音操筆二百年來可應傳燈僧寶之選者又有幾則雖金碧土木之莊嚴崇之至於天而廣之至於十由旬何益盖法道之衰相見矣師庠校名士始欲以禄養為孝既以𢎞法報恩為孝麟驥壯盛而龍象超忽最初發念固已卓然名聞利養之外矣龎藴罄百萬而擲漢水僧紹冒三毒以開攝山豈足専美乎師自主法席以來既三紀行在梵網志在觀經標淨業則東村立清規則百丈析義䟽則玉泉辨宗乘則慧日摧隂魔則板度空排戲論則秀鐵面雲棲雖幽逈荒率無諸莊嚴有具眼通者必曰先師塔廟在矣有具耳通者必曰水鳥樹林念佛法僧矣有具宿命通者必曰某古徳再來矣毘嵐偃岳而不波大浸稽天而不溺是雲棲之興法道大有賴也夫師所著有彌陀經䟽鈔緇門崇行録禪關筞進等書數十種鋟行於世師俗姓沈名祩宏字佛慧仁和人陶望齡記昔世尊以五時彰敎隱顯權實順布而不忒若温緜凉簟隨候異設凡以逗機宜適根莖而已正法東嬗師資角立曰講曰律曰禪並而為三然軌轍同歸君臣逓用斯亦一代時教之遺也天目中峯師有言密部如春慈恩如夏南山律宗如秋敎外别傳之㫖如冬自祖燈輝三家替法乆生濫藥療權施雖離言絶跡之塗而言跡具焉大智剏規則律該圭峯詮經則教設至永明天衣而降多寄指蓮邦黙標心土持名淨念殆庶幾所謂密者然則少林一宗四序偹矣由是以觀一氣煥寒而歲成一音開遮而化闡莫不因宜而建之遇耳而通之離之以提宗合之以成務其致一也像季陵夷學者文言依通未嘗有古先生研幾極深之用在有以率情資空以䕶過而欲圓契法界密還心源此與皃嬉囈語何異嗟乎禪學盛而敎律薄禪學衰而敎律亡矣破器焦種道所不載猶讙於衆曰吾宗固然儀範弛解觀行滅裂而菩提逹摩單傳之敎亦掃地盡澶漫流湎無甚兹時者昏衢積晦慧日乃升於是雲棲大師應期運秉慈願挺生於冠族飛藻於儒苑然後辭榮捐愛薙染登具荷包咨叩百城忘疲隆慶辛未歲始返錫武林五雲山之西塢宋伏虎遺刹在焉礎石就泐餘堵纔存而師䝉露戴星晏坐其下久之方刋灌莽成苃舎繩牀瓦鉢獨寤弗諼而已然薫之以戒徳扇之以𤣥化慈戢猛獸誠感霖雨於是逺近甿庶順風爭趋輸材赴工如水投壑無何而役竣仍其始號曰雲棲禪院殿門不設庖湢具體惟禪室法堂制稍崇敞以奉經像集徒侣盖大師夙志也大師之敎革偽正訛貴繩檢黜戲論一歸於真履底於妙悟謂綱紀道俗者莫大於行是故有緇門崇行之録覆䕶羣動者莫尚乎慈是故有戒殺放生之文嚴淨尸羅兼資物我者莫廣於梵網是故有戒䟽發隱之義頓超直指尅證靡濫者莫要於禪是故有禪關筞進之篇於後後世為大津梁於諸方便中出勝方便普被羣機横絶三界者莫徑於淨土是故有彌陀經䟽鈔之作嘗稱曰阿伽已疾如意雨寶總羣塗而一貫者其惟持名一心乎其進為行淨為律契為法究為禪以故師之唱演靡所不備而宗趣有在緇素之徒咸望大師為善導雲塢為極樂交廣庸蜀幽并冀朔之逺莫不繭足皈禮延頸嚮化與於籌室者不可勝數而師尤隱解顯行撝謙不居痛抑狂瀾躬為之隄岸終身退然處於學地雖凡衲單士通謁而至者咸與之均禮於戲非盛徳何以臻此乎而昩者謂院以禪名宜杜塞岐徑獨蹈大方紹明從上以來單傳直截之㫖若以是為師少者夫治水者撤堰而㵼之築防而居之乳兒者塗苦而禁之洗滌而養之惟其宜適也世降習偷邪師謬解如波如馳茍務泯相毁敎等持犯均淨穢决竇於旱秋絶哺於饑子豈大士匡時應㑹起極弊振將絶之道哉俗善畫龍見龍而驚塗羮雜陳而笑耕稼者不亦舛乎是山形勝洎創建縁起詳載大師所撰記及董太史其昌碑中故不具具言師所以應化拯時有功宗乘者勒石講堂詔於無窮天柱寺在雲棲三聚亭里許即常樂寺宋開寶建妙山菴在妙山僧如寞建白沙菴在白沙塢通黄山天竺棲真寺在定北四啚有賛寧塔定安寺在定北二啚定明寺在定北三啚金蓮寺在定北一啚妙靜寺在錢塘縣定山北二啚宋元祐中投子義青禪師開山賜額明陽寺建炎四年法成禪師重建山門兩廊僧堂更名妙靜有偈曰選佛塲開妙靜山直敎千佛笑開顔圓成屋裏諸功徳只在當人㸃首間慶元六年庚申歳紹隆禪師修元至正二十五年海悟禪師重修洪武六年太古羲禪師重修寺有古井定南寺在公館側慈巖院在楊村風水洞側舊名恩德洞洞中石子紅㸃如丹持出即隱置於舊如故白樂天詩并序予到郡周歲方來入寺半日復去俯視朱綬仰睇白雲有媿於心遂留絶句雲水埋藏恩徳洞簮裾束縛使君身暫來不宿歸州去應被山呼作俗人蘇東坡詩并序徃富陽新城李節推先行三日留風水洞見待詩云春山磔磔鳴春禽此間不可無我吟路長漫漫傍江浦此間不可無君語金鯽池邊不見君追君直過定山村路人皆言君未逺騎馬少年清且婉風崖水穴舊聞名只隔山溪夜不行溪橋曉溜浮梅蕚知君繫馬巖花落出城三日尚逶遲妻孥怪罵歸何時世上小兒誇疾走如君相待今安有龍門菴在龍門山頂四面石壁路屈曲而上如盤谷有僧結菴於此光明寺在定山北唐顯慶元年高宗勅賜光明禪寺明善導和尚説法開山師念佛一聲即有一道毫光從口出自十至百光亦如之勅賜寺額正綂十一年惠辨初重建萬厯間寺産俱為豪猾侵漁尋復故地有龍池古井王勃題光明寺南池幽景詩云笑倚雕䦨瞰碧流漾花天氣漸和柔日行東陸春偏早人在西園景自幽出水蒲芽纔短茁牽風荇帶欲輕浮緑波涵育羣魚樂不識江湖有釣鈎武林梵志巻二
