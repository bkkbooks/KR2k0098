body:
  text: 武林梵志巻三明吳之鯨撰城外南山分脉由湧金清波至十八澗靈芝寺在湧金門外宋有浮碧依光堂為孝宗臨御之所朱靜佳詩黄金匝地小橋通四面清平納逺空雲氣常扶天子座日光浮動梵王宫殘碑幾字莓苔雨清磬一聲楊栁風沙鳥不知行樂事背人飛過夕陽東褒親崇壽教寺俗稱劉娘子寺宋紹興十八年劉貴妃建貴妃臨安人入宫為紅霞帔得幸累遷才人婕妤婉容尋進貴妃專掌御前文字工書畫畫上用奉華堂印然恃寵驕侈常盛夏以水晶飾脚踏髙宗見之取以為枕妃懼自此少戢父懋恩金人南侵獻錢三萬緡以助軍費髙宗嘉之遂令建寺以為功徳有泉自鳳凰山而下注為方池命為鳳凰泉于湖張孝祥書額内有松雪亭觀音洞筆架池偃松交枝檜壁間舊有陳公儲畫龍甚奇弁陽翁詩翟羽鸞綃事已空奉華遺寺對髙松宫欹鳯去無人見且㸔門前粉壁龍秦少游詩匹馬驕嘶石路斜觀音洞口踏煙霞普陀風景差相似只欠潮音小白花周瑞臣詩萬竹蒼寒擁寺門寺碑金字御書存榮華肯信當年事儀制空留後世恩影閣有聲塵網暗殯宫無月玉花昏見梅不敢輕攀折恐是春風水際魂觀音菴有觀音洞在慈雲嶺北頭陀菴在慈雲嶺下華津洞側本宋趙冀王園疊巧石為之者水石竒勝花竹蕃鮮有仙人棋臺旁為梯雲嶺石磴峻絶舊有水月寺元末燬有水月池靈固石蘇子瞻詩千尺長松掛薜蘿梯雲嶺上一聲歌湖山深秀有何處水月池中桂影多香圓菴在梯雲嶺西上有石洞出泉淨慈寺在南山周顯徳元年建名慧日永明院太師改建賜壽寧院屬歳旱湖涸寺西甘泉出焉因鑿為井名曰圓照南渡時僧道容鳩工塑五百阿羅漢以田字殿貯之内有宗鏡堂為永明壽禪師造宗鏡録後新建永明禪師舎利塔黄汝亨為記方伯呉用先為碑銘下有萬工池金鰻井神運井法華臺懴堂竹閣藏石刻金剛經羅漢松歡喜巖居然亭蓮花洞閎勝甲湖中後有文昌閣創於葛寅亮而仁和令呉光義成之寅亮為記淨慈自有志不盡載蘇軾詩卧聞禪老入南山淨掃清風五百間我與世疎宜獨徃君縁詩好不容攀自知樂事年年減難得髙人日日閒欲問雲公覔心地要知何處是無還黄省曽詩隠才抗貞歩遶履存同調琴瑟心既開登捫與茲掉浼浼北潮屬窈窈南山眺雙情交逺襟晟論皆清詔蘭陽佐勝羽翠皁延興笑靈紀倐攀仰表刹在瞻造金軀儼峩容寶宇廓層嶠五藥懸采掇八正期精邵雲林琅法鼓苕朩鳴芳翲遨衷未云已盤廻盡西照孫一元卜居詩石上藤蘿對夕曛解衣長日坐來頻挽回滄海真無計領畧青山合有人養鶴似嫌雙口累為漁又過一生身相逢惟是南屏老獨樹柴門許卜鄰王守仁詩溪風漠漠南屏路春服初成病眼開花竹日新僧已老湖山如舊我重來層樓雨急青林迥古殿雲晴碧嶂迴獨有幽禽解相信雙飛時下讀書臺王世貞詩擁刹芙蓉欹欲翔岫雲雙結吐寒香十千乾闥婆天藥五百阿羅漢道塲未必應真超刼火還因勝地屬空王南園實傍珍珠墅指㸃烟蹤並渺茫豐道生詩千巖萬壑玉層層夜半山腰見佛燈竹影掃牕塵不到滿牀風雪定中僧屠隆詩西湖盡處是南山長日幽人晝掩關寶界門通霄漢外香臺路接水雲間不聞朝市風塵急自愛僧寮歲月閒㕘得三明詮四諦茶烟初斷鶴飛還雷峯塔在淨慈寺前址宋郡人雷氏居焉錢氏妃於此建塔故又名黄妃俗以其地嘗植黄皮又曰黄皮塔吳越國王錢俶黄妃塔記曰敬天修徳人所當行之矧俶忝嗣丕圖承平茲久雖未致全盛可不上體祖宗師仰瞿曇氏慈忍力所沾溉耶凡於萬幾之暇口不輟誦釋氏之書手不停披釋氏之典者蓋有深旨焉諸宫監尊禮佛螺髻髮猶佛生存不敢私秘宫禁中恭率珤具創窣堵坡於西湖之滸以奉安之規橅宏麗極所未見極所未聞宫監宏願之始以千尺十三層為卒爰以事力未充姑從七級梯旻初志未滿為歉計甎灰土水油錢瓦石與夫工藝像設金碧之嚴通緡錢六百萬視㑹稽之應天塔所謂許𤣥度者出没人間凡三世然後圓滿願心宫監等合力於彈指頃幻出珤坊信多寶如來分身應現使之然耳顧𤣥度有所不逮塔成之日又鐫華嚴諸經圍繞八面真成不思議刼數大精進幢於是合十指爪以贊歎之塔曰黄妃云吳越國王錢俶拜手謹書於經之尾俗稱塔鎮青魚白蛇讀吳越王記知所供惟佛螺髻髮耳湖心寺在湖中今亭即其遺址三塔俱在外湖三坁鼎立並係湖心寺皇明𢎞治間僉事陰子淑者秉憲甚厲時寺僧倚怙鎮守中官杜門不容官長以酒肴入陰公大怒亷其姦事立毁之並去其塔相傳湖中有三潭深不可測故建三塔以鎮之南宋舊圖從南數湖中對第三橋之左為一塔對第四橋之左為一塔第五橋之右為一塔塔形如瓶浮漾水中三潭印月詩有云塔邊分與宿湖船又云塔影亭亭引碧流俱實境也萬厯間開葑田數頃築隄植栁為放生池惠因講寺後唐天成二年吳越王建宋元豐八年髙麗國王子僧統義天入貢因請淨源法師學賢首教元祐三年以金書晉譯華嚴經三百部入寺施金建華嚴大閣藏塔以崇之元祐四年統義天以祭奠淨源為名兼進金塔二所適蘇子瞻守杭上疏云自熙寧來髙麗屢入朝貢兩浙騷然皆因奸民徐戩等交通誘引妄談庸僧淨源通曉佛法以致義天羡慕來朝從源講解淨源既死其徒復持真影舎利違禁過海以致義天差人祭奠兼進金塔探瞰朝廷受之則以貪示外夷計搆紛然朝貢踵接夷使所至圖畫山川購買書籍不惟中國受疲而邊防亦疎乞却金塔勿受絶其來意神宗從之寧宗書華嚴經閣理宗書易庵元延祐四年高麗瀋王奉詔進香繙經於此至正末燬國初重葺俗稱高麗寺中有轉輪藏後奉放光大士陸樹聲題曰妙應門伽藍殿設蘇文忠公像萬厯壬子建凖提閣方伯吳公塑凖提聖像右有華嚴閣楞伽室文昌閣後為唐清涼國師塔銘唐定慧禪師傳法碑俱裴休譯寺外玉岑山理宗御書玉岑二字一刻石一題匾山上玉岑二字許采書遶寺為慧因澗筲箕泉鐡牕櫺洞口髙數尺舊有蛟龍出入人畏焉鑄鐡牕櫺嵌於石槽以拒之水自牕櫺中出六月如冰過慧因寺前折西湖不竭秦淮海題名記濯足於惠因澗是也六通律寺舊名六通慈德院呉越王建延彦求法師演律法其中有辟塵爐非朩非石扣之錚然纎塵不染嘉靖間垂廢僧𤣥公乞虞吏部為記募施尋亦棄去壬子方伯浮渡吳公清復召僧性瑛給劄焚修瑛矢志恢復建山門二座六通律寺方伯題慧日重光錢塘令楊萬里題法地重開葛寅亮題圓通勝境錢養亷題虞淳熙舊記略曰武林繇王鏐衆建仁祠兩邑湖山間梵唄刹光六通四辟矣顧臨水者迷於西子依山者壓於䕫魈踞形勝者鄰於伏屍之宅惟茲六通律寺魔惱穢累所不侵王鏐倚為神通勝因者也幽淙靈石掩映精廬寶鼎辟塵塵踪竟絶禪者每持律證通也度長耳和尚於此咫尺袈裟地定多趺憩所證無漏留蜕千秋有由致矣日月邁徃漸以蕪圮波旬侵疆四履不得通至魔惱穢累倍於衆祠然金身在宫猶照徹無礙也犯者七日韋杵殞始竦然稍歸侵地而僧𤣥公視布金長者多在晉陵松陵數千里内便徃詣乞長者不惜有漏財於是崇宫恢土復徃六通矣法相寺俗稱長耳相宋范楷記碑漸蝕明王穀祥記甚核寺内有宗慧堂竹閣雲壑禪棲頴秀山房青蓮居種石軒夢化石近寺里許髙竹青森非復塵界督撫甘士价平湖陸長庚倡縁築石逵甚整沿塢而上為定光菴古佛修證處陸長庚有記菖蒲缸錫杖泉聽泉亭蘇軾題又上為西生築鏡花閣古梅參差湖波掩映亦佳境也明王榖祥記法相寺宗慧大師碑杭州西湖之南山最勝處為南髙峯其陽則巖巒洞壑奇絶詭麗其陰則羣山紆迴壁石嶮峭逶迤入徑深朩茂窅如與世隔為法相寺五代石晉時建故名長耳院宋易今名寺有宗慧大師真身崇奉焉祈嗣者徃禱輒應四方人士多於皈禮吾蘓郡侯平陽頤齋徐公節嘗與穀祥述其嚴君月巖翁中歲舉子不育因過杭乞靈於法相果符灌頂之祥遂生公公既貴翁囑云若官於南尚無㤀拜酬祠下自公為郡有事於杭凡再謁焉因訪大師事跡本末寺故有碑刻宋翰林侍講范楷所撰記也元季燬僅錄其文讀之亦失次矣公謂大師妙覺普應功出思議之表遺蜕宛具實係瞻仰茍不詳厥所自則傳逺易譌可乎哉乃命穀祥重為譔述按大師姓陳氏名行修號性真泉南人也大唐景福元年正月六日母夢吞日驚寤而生長耳垂肩異香滿室家人己訝其非凡相迨七歳猶不言或問之汝非啞乎忽應聲曰不遇作家徒撞破烟樓耳人益奇之比長昭朗中涵湛寂無垢讀書過目成誦旁及内典竟契夙心徧閲三藏卓悟指歸乃幡然欲游方外脱屣塵俗躡屩名山至金陵瓦棺顧而樂焉遂祝髮受具戒品圓明律議精曉去叅雪峯存禪師得心印所謂髻珠衣寶已獲充牣再游天台國清寺用苦行力以廣資施蒔茗彌山谷從人采擇日巖畔猛獸巨蛇徃來左右馴擾不去後梁開平間至四明山獨棲松下説法則天花紛雨又趺坐龍尾巖結茅為蓋百鳥啣花飛繞經歲以為常所坐碧蒲當膝處成㘭其跡猶在後唐同光二年至杭之西湖南山喜其後塢依石為室禪定其中乏水給飲乃卓錫嵒際清泉迸出水源不涸山中人至今賴之大師功行具足崇事景赴凡旱潦疾疫以及求嗣者咸趨之即説偈應副靡不靈驗人或問師如何有是長耳即以手曳耳示之不發一語有僧來叩曰南峯頂難到麽師答云只為他㑹不過僧云到後如何師曰孤峯獨宿其開迷了義類如此後漢乾祐三年十一月二日呉越王以誕辰飯僧有永明禪師者亦異人也王問永明今有真僧降否永明曰長耳和尚乃定光古佛應身也王趣駕㕘禮稱師為定光出世師黙然但云永明饒舌少選跏趺而化其狀如生久之益膚革津澤爪髮復長月必三淨時有舎利後值金兵侵境刃傷之流血白色兵懼而退自是肌理失潤恐愈久而毁也乃以髹塗骸體南宋咸寧三年僧司以事聞賜之法號曰宗慧大師云劉士亨詩湖上招提信少雙翠微樓閣白雲牕耳聞古佛遺真像眼見真如竪大幢衲挂紫藤驚鼠竄鉢分滄海毒龍降懷香欲叩毘尼藏寸筳臨鐘不易撞沈懋學竹枝歌平生性愛竹竹深無爾何凌霄一千尋比肩十萬个摇摇森珮環戞戞鳴玉珂睛梢上摩天靈根下窮河一碧寒侵衣寸陰淡澄波時坐清塵骨再坐除煩疴怪來成久坐清虚蕩天和最如風生凉恰似明月多月明風亦佳仙人忽相過授我餐霞方贈我採芝歌旁有洞簫使吹徹雙青娥娟娟捧霞觴灼灼顔微酡夜深山轉幽晨光動巖阿髙峯一片雲催雨成滂沱陰晴倐異態况彼日月梭憶我昔來止足力猶自番經今逾九秋如願幾蹉跎依然對修竹憑將隻眼摩徐渭游法相詩蓮花不在水綠葉簇青山徑折雖能入峯迷不可還拂蒲㸔石活刳竹引溪潺莫怪淹餘日明朝恐未閒屠隆詩長耳原非相㤀形始悟心一燈懸普照萬竹散清陰雲卧僧衣薄泉飛錫杖深未能蠲世事聊爾滌塵襟豫章樊良樞已酉人日邀張魯叟聶純中遊法相詩空由清寂迥藏春杖底風煙傍客身濟勝百年誰是主登髙此日又逢人華龕雲蔭松谿冷石竇泉香竹閣新且欲從君歸白社何妨載酒徃來頻錫杖泉詩盤迴磴道碧苔封忽轉幽岑澗水淙人自安禪留卓錫泉因説法解聞鐘清瀾刷影巢窺鶴定水摇光鉢幻龍便欲枕流來此住坐㸔雲石漱孤松胡來朝詩野心不羡貴人珂結得山縁向晚過澗水遶流茶竈沸暮鴉知暑竹陰多何年蒲坐僧歸定今夕雲棲翠入蘿却愛空門有實際繁華滿眼竟如何大仁院在南山石屋洞呉越王建宣和三年改賜今額咸淳二年建觀音諸天寶閣洞如屋髙敞虚明迄二丈六尺鐫羅漢像五百十六身佛像題名幾遍俗呼石屋寺其底還窄通幽下有泉仇仁近遊石屋詩誰擘空青露石㘭游龍伸臂下南髙鬼神穿鑿地脉碎風雨支撑天柱牢峭壁蒼苔侵佛髻懸崖滴乳濕僧袍伽藍聞是香山叟燈暗祠荒沒野蒿大慈菴司禮孫隆建滿覺院在滿覺隴有法華泉金蓮池萬厯戊戌僧海龍重建深澗茂竹漸與世逺八月桂花盛時游人甚盛隴頂有波羅菴歸雲菴宋寧宗時有永清禪師坐石窟中聞髙峯鐘聲悟道萬厯壬子僧海龍築靜室其址改稱䕶雲菴烟霞寺晉開運元年僧彌洪結菴洞口遇仙人指山後有勝蹟洪徃忽見羅漢六尊題像石壁若鏤成者未幾洪卒呉越王夢僧告云吾兄弟十八人今方有六王其聚之遂補刻十二尊以符所夢今洞口所刻相傳為南宋宰官數百人像洞後為清修院左有普同塔卧雲塔劉公泉石佛接待菴西有烟霞嶺北有九峯巖洞傍為象鼻峯普賢塔舒嘯亭上方井佛手崖落石崖東坡留題尚存寺久圯町畽鹿場蠶食者過半萬厯已亥司禮孫隆重建寺未有僧禪師宏學持戒習靜不下山十五年給劄延入為住持學復傾衣鉢成之大雄殿地藏殿左右雲房漸集廣潤復拓地為華嚴堂學弟子雄鑑嗜竒博古善詩畫號瘦石今埋骨象鼻峯下周紫芝詩瀕湖兩峯髙屹立曉相望蒼凉昇海日骯髒露千嶂羸驂絶坡陀巖谷飽追訪緬懷洪荒初藴畜含萬象渾沌久已死倐忽真巧匠誰令鑿空手出此竒嶮狀中虗納遊雲谷靜答幽唱暗穴下無底濤聲相悲壯十八志聲聞附石出遺像誰其架修椽置屋雲雨上青山不知數繞屋森百丈忽於兩峯間萬頃見烟浪澎湃海潮聲徃徃入藜杖天公愛此山令我拜嘉貺渺焉隔仙凡欲徃謾惆悵便當學枯禪綺語蠲宿妄自足伴周游長年此遐放淨心院在水樂洞舊為錢氏西關宋淳熙以其地賜李隶仍建佛宇巖石盤峙有洞虚窈泉味清甘聲如金石東坡水樂洞詩君不學白公引涇東注渭五斗黄泥一鍾水又不學哥舒横行西海頭歸來羯鼓打梁州但向空山石壁下愛此有聲無用之清流泉無絃石無竅强名水樂人人笑慣見山僧已厭聽多情海月空留照洞庭不復来軒轅至今魚龍舞鈞天聞道磬襄東入海遺聲恐在海山間鏘然澗谷含宫徵節奏未成君獨喜不須寫入薰風絃縱有此聲無此耳榮國禪寺即南髙峯塔院宋寶祐五年福王與苪建咸淳六年安撫潛説友創華光閣五顯祠峯在南北諸山之界塔舊址居峯頂晉天福間建宋崇寧乾道兩度重修元季燬七級為五級嘉隆間有戎帥某惑青烏家言賄僧移塔於前塔頂不及上而罷今塔漸圮而寺亦衰萬厯壬子六月二十四日申刻震雷繞擊磚石俱碎識者言㑹城關係亟宜恢復俟機緣到則舊址及鐡頂現存也田藝衡稱塔中四望東瞰平蕪烟消日出盡山之景南眺大江波濤洄洑舟楫隱見杳靄間西接巖竇怪石翔舞洞穴邃宻其側有瑞應像巧若鬼工北矚陵阜陂陀曼衍箭櫪叢出麰麥連雲山椒巨石屹如峩冠者名光照壇相傳道者鎮魔之所頂有鉢盂潭白龍洞語若寫照云最上菴在髙峯頂畔吳之鯨題僧圓松建平湖千頃胥江三折俱在几席間子夜㸔漁燈離合如星陣胡𦙍嘉贈松上人詩上人家在白雲裏左瞰明湖右江水縠紋湖上碧千層練色江波萬餘里落日江臯一鴈飛薄寒初欲上征衣此時相憶重回首遥見白雲天際微覺照菴陳禹謨題在最上左僧大繼建呉之鯨贈德宗繼公詩繙經入蒼渺晴旭射孤峋䇿杖穿新竹相攜共石隣綠蘿菴僧大善建在覺照左傍有潁川泉大旱不涸演福菴在髙峯無門洞之陰俗稱南天竺山下有演福寺舊址有夕佳樓白蓮院隋開皇建今廢菴即寺之下院隆萬間三際禪師諱宗通山東人棲無門洞立禪苦行二十餘年後建菴於此忽一日辭衆沐浴禮佛撫石面西説偈立化偈曰六十二年住世不染紅塵雜事如今立化歸西親見彌陀受記歸塔於洞側丁丑僧廣先宏珂濟明重建有香巖室葛井琳琅泉志又稱辨才法師塔在演福院東坡銘老龍井復載辨才塔未知孰是吳之鯨琳琅泉銘由南峯之陰曲磴右折穿石為户松竹映薄幽扃乍啓為演福山居余自甲午七夕至此樂不可言因留寓時巖際荆花忽發一枝紫菂鮮耀禪師卧雲孫瘦石相與竒之尋訂方外久要及卧雲移錫烟霞瘦石歸葱嶺余亦久不復過矣今年冬仲偶來避喧則卧雲法兄雪崖年六十方坐關修禪定孫光中愿而朗語黙宜人余復喜為留寓乃拂容雲藏煥然新燦山若増勝云殿旁有小閣閣前後俱竹竹中俱琪石光中疏剔竹根剷土踰丈許石骨盡現忽函中小湫泓然澄冽光中驚喜以為不煩鎚鑿而驟得甘泉不可無紀余又適與相值亦一數也因在竹石間號曰琳琅泉而系之以銘銘曰清莫如竹蓓蕾貯妍與石為隣蒼翠便娟乳竇忽通遂據其全雖然自有此石即有此泉豈先有竹而余和以三緣為之結好於百年乃余撫石壁之青芊覩竹影之檀欒吸以癭瓠吾陶吾天而稱之曰琳琅不過偶然延恩衍慶寺俗稱龍井寺唐乾祐二年居民凌霄募縁建為報國㸔經院宋熙寧中改壽聖院蘇子瞻書額紹興三十一年改廣福院淳祐六年改是額元豐二年辨才禪師自天竺歸老於此不復出入與蘇子瞻趙閲道友善後人因建三賢祠祀之東坡竹石亷宣仲枯朩楊次公詩存焉歲久寺圮萬厯二十三年司禮孫隆命僧真果重修構亭軒築橋梁甃浴麟池剏霖雨閣舊有歸隱橋方圎菴寂室照閣閒堂訥齋潮音堂滌心沼神運石薩埵石辟塵爐片雲亭過溪亭沖泉諸天閣秦少游龍井寺記元豐三年秋後一日余自呉興道杭東還㑹稽龍井有辨才大師以書邀余入山比出郭日已夕航湖至普寧遇道人參寥問龍井所遣籃輿則曰以不時至去矣是夕天宇開霽林間月明可數毫髮遂棄舟從參寥策杖並湖而行出雷峯度南屏濯足於惠因澗入靈石塢得支逕上風篁嶺憩於龍井亭酌泉據石而飲之自普寧凡經佛寺十五皆寂不聞人聲道旁廬舎或燈火隱顯草朩深鬱流水激激悲鳴殆非人間之境行二鼓始至夀聖院謁辨才於潮音堂明日乃還孫太初詩眼底閒雲亂不開偶隨麋鹿入雲來平生於物原無取消受山中水一杯虞淳熙詩龍卧梯仙國風霞冷玉壇伊人歌夜澗若士障秋瀾儒摘五星落禪依十地安片雲爭出岫留石借君㸔屠隆詩藕花菱葉傍輕鷗路入南山景更幽赤日未消團扇暑青蘿先到寺門秋風前萬樹蟬鳴急雨後千崖水亂流好士秪今劉尹在身慙𤣥度得同游黄猷吉一片雲詩南朝四百八十寺何寺能藏一片雲避暑偶來依石坐啜殘青茗日將曛鉢池菴在寺右山傍有洗鉢泉徳周果師棲隱處寺重興其力居多塔在寺之龍山吳朗士為之銘老龍井有水一泓寒碧異常幽僻清奥過風篁嶺非復塵刹矣其地産茶為兩山絶品郡志稱寶雲香林白雲諸茶乃在靈竺葛嶺之間未若龍井之清馥雋永也再上為天門可通靈竺徑道﨑巇草樹蓊鬱人烟曠絶山名暉落塢僧如瑛買山築室三楹數年屋成得泉一泓味甘色白老龍井基側有辨才塔今毁方圎菴在龍井山詳米芾記中天竺辨才法師以智者教傳四十年學者如歸四方風靡於是晦者明窒者通大小之機無不遂者不居其功不宿於名乃辭其交遊去其弟子而求於寂寞之濵得龍井之居以隱焉南山守一徃見之過龍泓登風篁嶺引目周覽以索其居岌然羣峯宻圍灌木蔽翳四顧若失莫知其鄉逡廵下危磴穿深林得之於烟雲髣髴之間遂造而揖之法師引予並席而坐相視而笑徐曰子胡來曰願有觀焉法師曰子固觀矣而又將奚觀予笑曰然法師命予入由照閣經寂室指其菴而言曰此吾佛亦如之使吾黨祝髮以圎其頂壞色以方其袍乃欲其煩惱盡而理體圎靈慧修而徳相顯也蓋溺於理而不逹於事迷於事而不明於理者皆不可謂之沙門以制禮樂為衣裳至於舟車器械宫室之為皆則而象之故儒者冠圓冠以知天時履方履以知地形蓋蔽於天而不知人蔽於人而不知天者皆不可謂之真儒矣惟能通天地人者真儒也惟能理事一如向無異觀者其真沙門歟噫人之處乎覆載之内陶乎教化之中具其形服其服用其器而於其居也特不然哉吾所以為是菴也然則吾直以是為蘧廬爾若夫以法性之圎事相之方而規矩一切則之所以休息乎此也窺其制則圎蓋而方址予詰之曰夫釋子之寢或為方丈或為圎廬而是菴也胡為而然哉法師曰子既得之矣雖然試為子言之夫形而上者渾淪周徧非方非圓而能成方圓者也形而下者或得於方或得於圓或兼斯二者而不能無悖者也大至乎天地近止乎一身無不然故天得之則運而無積也地得之則靜而無變是以天圓而地方人位乎天地之間則手足具二者之形矣蓋宇宙雖大不離其内秋毫雖小待之成體故凡有貌象聲色無巨細無古今皆不能出於方圓之内也所以古先哲王因之也雖然此游方圓之内者至於諸法同體而無自位萬物各得而不相知皆藏乎不深之度而游乎無端之紀則是菴也為無相之菴而吾亦將以無所住而住焉當是時也子奚徃而觀乎嗚呼理圓也語方也吾當㤀言與之以無所觀而觀之於是嗒然隱几予出以法師之説授其門弟子使記焉元豐癸亥四月九日慧日峯守一記不二作此成過予愛之因書鹿門居士米元章撰并書波羅菴在錢王灣僧性桂建獨居苦修境地幽勝右有鹿耳洞報恩寺唐貞元間建在萬松嶺西内有舞鳳軒萬菊軒浣雲池銅井元至正間築城移建大井巷國初呉山崩水壞暫併海㑹寺成化年仍徙故址𢎞治十年㕘政周朩改寺為萬松書院僧寂源於萬厯壬子建南山楊梅嶺下名報恩菴以存古蹟白樂天詠浣雲池詩白雲本無心舒巻長自潔影落一鑑空可浣不可涅鳶飛魚躍間上下俱澄澈此意難與言覽之自怡悅蘇子瞻題萬菊軒詩一軒獨為黄花設富擬人間萬石君佳本盡從方外得異香多在月中聞引泉北澗分清露開徑南山破白雲此意欲為知者道陶翁猶自未離羣理安禪寺亦名湧泉院在九溪十八澗南通徐村北達龍井七峯環繞雙澗合流境地幽勝視兩峯三竺又一竒矣𢎞治四年六月念四日寺廢於洪水頽崖深谷無過問者萬厯戊戍僧契靈字仲光掛瓢巖壁僅可容膝掘土丈許石磉柱礎舊址儼然洞室覆泉細如噴珠復下注為二池石甃六方施生臺石塔半座刻涅槃經偈右石壁間有大佛字縱横丈許俱舊物因築土填谷藩以竹樹有萬歲石牌涌泉龍王石碑皆掘地得之者於钁頭邊二十餘年發明向上事皈依漸衆辛亥臘月方伯呉用先竇子偁捐助郡人黄汝亨呉之鯨為勸貲重建禪堂五左右佛廊麤備有微笑堂松巔閣挂衲齋白舫與老亭寺旁有靜明禪師塔普同塔寺前後山百餘畮呉方伯給帖歸寺并題理安禪寺額邑侯樊良樞有疏有法雨泉涌泉過溪橋螺髻峰月輪峰迴象峰大人峰白鶴峰大慈峰八覺峰鹿卧洞吼獅巖合掌巖佛石巖吳之鯨澹社序由石屋沿水樂洞度嶺為十八澗山勢峭逼曲澗蜿舞樵語炊烟閴隔數里乍入其中真如雲井化城都未經見忽然溪窮山盡暫欲小憩谽谺復豁别開一境層梯碧映巖壑竒杳佛石戯呼小武夷余謂極似嚴陵七里瀨此最幽最勝南北諸山所絶少者也地幸荒蕪既無紺殿華林之設又無行人可為嚮道客至急無所調其饑渴以故游屐亦絶少佛石靈公喜甚遂乃依阿團茅枯鍊於此蒲簷無瓦髙不過睂雨至戴傘坐室中或時凍雪三日瓶儲俱空有好道者賫升糧挾燧石徃訪之發火煨粥陶然清傲遂不復入城市今五年所矣居傍有一池水甘冽出虎跑錫杖上危壁蒼蘚䝉䕶其下游魚翛沒噴如雨花余每與佛石踞坐池上竟日無一言神氣淒肅不復知在塵世亦不願塵世人聞聲雜至㑹明殊鑑舊從余游文弱有志頗習韻語客子為築白舫與佛石隣而余亦有曲溪小閣在湖上近不越五里因共訂澹社為無言清坐之㑹友人胡休仲卓去病聞而樂之趣來同事並集有韻衲子每月一㑹茗供寂寞隨意談楞嚴老莊間拈一題為詩後期薄罰以督之每㑹必選湖山最勝處及佳風日而馮開之太史實來主席溪光山翠俱赴杖履此社遂幾與廬山爭勝余因語佛石太史今之坡公也宻殊琴聰都不足道龍泓一派清響與澗相接願毋相負如不佞與胡卓諸君隨意稱无咎魯直何不可矣張光弼詩春山縹緲白雲低萬壑爭流下九溪擬遡落花尋曲徑桃源無路草萋萋馮夢禎澹社詩寒隨早梅放春氣動林泉到此人青眼相期社白蓮清音茅屋下明月竹牕前澹意息心在都㤀俗慮牽得與逺公近無將陶謝分去喧聊避世集苦自逃羣曲澗移時汲深松靜夜聞空山門不閉遥度九溪雲方伯吳用先公餘同右轄竇淮南年兄赴貞父黄儀部理安之約訪佛石方丈詩収印出城郭行行入白雲泉聲迤竹響鳥語隔松聞曲澗迴峯合空門野逕分平生蕭散意獨喜對僧羣招尋豈憚逺九轉聽溪流徑僻風烟靜山深林朩幽青蓮覔淨侣白社愜良游無限登臨興斜陽不可留鄒廸光贈佛石禪師詩紅塵曽不逺太古若為鄰面目非凡品鬚睂亦衆人結茆藏寶帙刳石奉金身小坐維摩榻巖花滿葛巾九折溪流潄石根芙蓉稠疊欵禪門六時常許猿聲報一室惟留虎跡存咒得山祗來侍食要將林鬼為司閽烟霞口角菩提相似爾何慙兩足尊王穉登詩廢寺荒蕪已百年師今結屋更安禪林如支遁堪棲鶴社似廬山喜種蓮巖畔伐薪常易米石邊接竹每供泉詩成盡是雲霞色不數清江與皎然黄汝亨詩短日優游亦小年不須薙髮竟安禪澄澄水白杯停雪片片峰青座擁蓮僧自開山同慧理客來潄石號寒泉陶公莫作攢睂態日飲茗茶已霍然陳繼儒詩山中樵子不知路世上俗人誰識名何當老我松巔閣燒木蒸藜過此生胡𦙍嘉詩十八澗名古君今第幾重屋欹三尺雪門抱萬尋峰抽笋防羣鹿懸松鬭老龍名山終自戀有累尚周顒到此開心地應消歳月長匡牀流作枕阿閣石為梁魚浸榴花赤茶分荳子香不須談妙義白坐到羲皇僧完璞十八澗早行詩雞唱曙光分溪行見鹿羣草寒棲玉露衣濕帶朝雲殘月林間落疎鐘嶺外聞山家少人事晨起亦紛紛武林梵志巻三
