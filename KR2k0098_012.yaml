body:
  text: 武林梵志巻十二明吳之鯨撰歴朝勲績梵刹由武林建武林以潮汐濁滷之鄉彚聲名文物之盛代有作者功用不磨紀忠義俠烈樹名教之巨藩紀創業貽謀貌包絡之正域試一覽觀意深逺矣浙江在郡城之東南登西湖諸山則大畧可瞰其源發自徽州曲折而東以入于海故名浙江亦曰浙河其潮晝夜再上諸家立説不同宋時郡志載姚寛西溪殘語及徐叔明髙麗録二篇大扺皆云潮隨日而應月依隂而附陽元時聚伯宣作浙江潮候圗説又櫽括其詞更加明爽其説曰大江而東凢水之入于海者無不通潮而浙江之潮獨為天下奇觀地勢然也浙江之口有兩山焉其南曰龕山其北曰赭山並峙於江海之㑹謂之海門下有沙潬跨江西東三百餘里若伏檻然潮之入於浙江也發乎浩渺之區而頓就歛束逼礙沙潬囬薄激射折而趨于兩山之間抝怒不洩則奮而上隮如素蜺横空奔雷殷地觀者膽掉渉者心悸故為東南之至險非他江之可同也原其消長之故者曰天河激涌曰地機翕張揆其晨夕之候者曰依隂而附陽曰隨日而應月地志濤經言殊㫖異胡可得而一哉盖圎則之運大氣舉之方儀之静大水承之氣有升降地有浮沉而潮汐生焉日有盈虚潮有起伏故盈于朔望虚于兩弦息于朓朒消于朏魄而大小凖焉月為隂精水之所在日為陽宗隂之所從故晝潮之期日常加子夜潮之候月必在午而晷刻定焉夘酉之月隂陽之交故潮大于餘月大梁析朩河漢之津也朔望之後天地之變故潮大于餘日寒暑之大建丑未也一晦一明再潮再汐一朔一望再虚再盈天一地二之道也月經于上水緯于下進退消長相為生成厯數可推毫釐不爽斯天地之至信幽贊於神明而古今不易者也杭之為郡枕帶江海逺引甌閩近控吳越商賈之所輻輳舟航之所駢集則浙江為要津焉而其行止之淹速無不畢聽潮汐者或違其大小之信爽其緩急之宜則必至于傾墊底滯故不可以不之謹也某承乏茲郡屬兵革未弭之秋信使之往來師旅之進退雖期㑹紛紜邊陲警急必告之曰謹候潮汐毋躁進以自危然而跡累肩摩晨馳夕騖有不能人喻而户説之者考之郡志得四時潮候圗簡明可信故為之説而刻石于浙江亭之壁間使凢行李之過此者皆得而觀之以毋蹈夫觸險躁進之害亦庶乎思患而預防之之意云捍江塘築自吳越王盖江潮為患自唐巳然白樂天剌郡時嘗禱於神云滔滔大江南國之紀安波則為利横流則為害故我上帝命神司之今屬潮濤大湧奔激西北水無知也如有憑焉浸淫郊鄽壊敗廬舎人墜墊溺籲天無辜居易祗奉璽書興利除害守土守水職與神同是用備物致誠躬事䖍禱庶使水反歸壑谷遷為陵土不騫摧人無蕩析然未聞有修築之績也梁開平四年八月錢武肅王始築塘在候潮門通江門外潮水晝夜衝激版築不就命强弩數百以射又致禱于胥山祠仍為詩一章其末句曰為報龍王及水府錢江借取築錢城函鑰置海門山既而潮水避錢塘東擊西陵遂造竹絡積巨石植以大木隄既成乆之乃為城邑聚落凡今之平陸皆昔時江也潮水衝突不常隄㟁屢壊大中祥符五年郡守戚綸與兩浙轉運使陳堯佐申請遣使自京師部埽匠壕寨越州易柱石之制雖免水患而衆頗非其變法七年詔江淮發運使李溥同内供奉官盧守懃復依錢氏制專其事時水方大溢九年郡守馬亮禱于子胥祠下明日潮為之却又漲横沙數里隄遂以成景祐中隄復壊兩浙轉運使張夏作隄十二里置捍江兵士五指揮採石修塘隨損隨治杭人徳之作廟隄上今昭貺廟是也慶厯初六月大風驅潮堤再壊郡守楊偕轉運使田瑜協力築隄二千二百丈丁寳臣作記紹興十年以轉運副使張匯之請招填捍江軍額二十二年吏部尚書林文鼐建選乞選諳曉之士專置一司詢故老究利病脉絡而後興工且言羅刹江濱舊有吳王英烈王廟燼于回禄乞靈無地乞付有司營葺從之自是百餘年間屢修屢壊嘉熈戊戌秋潮由海門𢷬月塘頭日朘月削民廬僧舎坍者四十里已亥六月詔趙與懽除端明殿學士知臨安任責修築與懽奏先于傍近築土塘為救急之術然後于内築石塘又奏近觀潮勢忽覩異物非龍非魚什什伍伍鼓鬛揚鬐欲望奏告上帝或施強弩火炮以絶其妖又奏日役殿歩司官兵五千五百餘人并募夫工及修江司軍兵三千餘人貼立石倉夾植樁笆版木晝夜運土填築自水陸寺之下江家橋之上近江港口築壩南北長一百五十丈自團圍頭石塘近江築擦水塘長六百丈自六和塔以東一帶石隄添新補廢四百餘丈越三月畢工水復其故皇明成化八年八月九月江潮大溢塘壊特甚勅差工部侍郎李顒整築始復其舊鐵幢浦相傳吳越王鏐築塘以捍江水置鐵幢三以為水則幢製如杵徑七八寸出土可三尺餘其趾入土不知若干初置幢時塘猶未成慮潮蕩幢用鐵輪䕶其趾而以鐵綆貫幢幹且引綆維于上下之楗然後實土築塘故幢首出土耳宋淳祐間安撫趙與􅊸作亭覆幢今亭夷為民居獨存窪池而鐵幢之首嶄出可驗一在舊便門東南小巷一在舊薦橋門外皆湮塞無考獨在利津橋者僅存而又為民居所占若不表識乆亦湮矣劉伯温錢王箭頭歌鴟夷遺魄抝餘怒欲取吳山入江去雷霆劈地水羣飛海門扶胥没氛霧英雄一怒天可回肯使赤子隨鮫鮐指揮五丁發神弩鬼物辟易腥風開三百年來人事改濤落沙平箭空在石梁飲羽未足誇蜀國三犀謾欺怪近聞黄河水亂流青徐一半悲魚頭安得壯士斡地軸為拯斯民塗炭憂西湖故明聖湖也周繞三十里三面環山谿谷縷注下有淵泉百道瀦而為湖漢時金牛見湖中人言明聖之瑞遂稱明聖湖以其介于錢唐也又稱錢唐湖以其輸委于下湖也又稱上湖以其負郭而西也故稱西湖云西湖諸山之脉皆從天目天目西去府治一百七十里髙三千九百丈周廣五百五十里蜿蟺東來凌深拔峭舒岡布麓若飛若舞萃于錢唐而崷萃于天竺從此而南而東則為龍井為大慈為玉岑為積慶為南屏為龍為胥為吳皆謂之南山從此而北而東則為靈隠為仙姑為履㤗為寳雲為巨石皆謂之北山南山之脉分為數道貫于城中則巡臺藩垣帥閫府治運司黌舎諸署清河文錦夀安弼教東園鹽橋褚塘諸市在宋則為大内徳夀宗陽祐聖諸宫隠隠脈脈皆王氣所鍾而其外邏則自龍山沿江而東環沙河而包括露骨于茅山艮山皆其䕶沙也北山之脉分為數道貫于城中則臬臺分司諸署觀橋純禮諸市在宋則為開元景靈太乙龍翔諸宫隠隠脈脈皆王氣所鍾而其外邏則自霍山繞湖市夾道紅衝武林門露骨于武林山皆其䕶沙也聨絡周匝鈎綿秀絶鬱葱扶輿之氣盤結鞏厚濬發光華體魄閎矣潮聲海門而上者晝夜再至夫以上奔水導而逆以海潮則氣脉不解故東南雄藩形勢浩偉生聚繁茂未有若錢塘者也南北諸山峥嶸逥繞滙為西湖洩惡停深皎潔圓瑩若練若鏡若雙龍交度而頷下夜明之珠懸抱不釋若連蕚層敷柎瓣莊嚴而馥郁花心含瀼甘露是以天然妙境無事雕餙覿之者心曠神怡遊之者畢景留戀信蓬閬之别墅宇内所稀覯者也逮于中唐而經理漸著代宗時李泌刺史杭州憫市民苦江水之鹵惡也開六井鑿隂竇引湖水以灌之民賴其利長慶初白樂天重修六井甃函筧以蓄洩湖水溉沿河之田其自序云每減湖水一寸可溉田十五餘頃每一服時可溉五十餘頃此州春多雨夏秋多旱若隄防如法蓄洩及時即瀕湖千餘頃無凶年矣又云舊法洩水先量湖水淺深待溉田畢却還原水尺寸往往旱甚則湖水不充今年築髙湖隄數尺水亦隨加脱有不足更决臨平湖即有餘矣元懲宋轍廢而不治兼政無綱紀任民窺竊盡為桑田國初藉之遂起額税蘇堤以西髙者為田低者為蕩阡陌縱横鱗次作乂曽不容刀蘇堤以東縈流若帶宣徳正統間治化隆洽朝野恬熈長民者稍稍搜剔古蹟粉繪太平或倡濬湖之議憚更版籍竟致閣寝嗣是都御史劉敷御史吳文元等咸有題請而浮議蜂起有力者百計阻之成化十年郡守胡濬稍闢外湖十七年御史謝秉中布政使劉璋按察使楊繼宗等清理續古𢎞治十二年御史吳一貫修築石閘漸有端緒矣正徳三年郡守楊孟瑛鋭情恢拓力排羣議言于御史車梁僉事髙江上䟽請之以為西湖當開者五其畧曰杭州地脉發自天目羣山飛翥駐于錢唐江湖夾抱之間山停水聚元氣融結故堪輿之書有云勢來形止是為全氣形止氣蓄化生萬物又云外氣横形内氣止生故杭州為人物之都㑹財賦之奥區而前賢建立城郭南跨吳山北兠武林左帶長江右臨湖曲所以全形勢而周脉絡鍾靈毓秀于其中若西湖占塞則形勝破損生殖不繁杭城東北二隅皆鑿濠塹南倚山嶺獨城西一隅瀕湖為勢殆天塹也是以湧金門不設月城實倚外險若西湖占塞則塍術綿連容奸資冦折衝禦侮之便何藉焉唐宋巳來城中之井皆藉湖水充之今甘井甚多固不全仰六井南井也然實湖水為之本源隂相輸灌若西湖占塞水脉不通則一城將復鹵飲矣况前賢興利以便民而臣等不能纂巳成之業非為政之體也五代巳前江潮直入運河無復遮捍錢氏有國乃置龍山浙江兩閘啓閉以時故泥水不入宋初崩廢遂至淤壅頻年挑濬蘇軾重修堰閘阻截江潮不放入城而城中諸河專用湖水為一郡官民之利若西湖占塞則運河枯澁所謂南柴北米官商往來上下阻滯而閭閻貿易苦于擔負之勞生計亦窘矣杭城西南山多田少穀米蔬䔩之需全賴東北其近塘濱河田地自仁和至海寧何止千頃皆藉湖水以救亢旱若西湖占塞則上塘之民緩急無所仰賴矣此五者西湖有無利害明甚苐壊舊有之業以傷民心怨讟將起而臣等不敢顧忌者以所利于民者甚大也部議報可自是西湖始復唐宋之舊盖自樂天之後二百嵗而得子瞻子瞻之後四百嵗而得温甫邇來官司禁約浸弛豪民頗有侵圍為業者夫陂堤川澤易廢難興與其浩費于巳隳孰若旋修于將壊况西湖者形勝關乎郡城餘波潤于下邑豈直為魚鳥之藪遊覽之娛若蘇子眉目之喻哉唐君名珏字玉潛㑹稽山隂人家貧聚徒授經營滫髓以養其母嵗戊寅有總江南浮屠者嘉朩揚喇勒智怙恩横肆勢燄爍人窮驕極滛不可具狀十二月十有二日帥徒役頓蕭山發趙氏諸陵寢至斷殘支體攫珠襦玉柙焚其胔棄骨草莽間唐時年三十二嵗聞之痛憤亟貨家具得白金百星許執劵行貸得白金又百星許乃具酒醪市羊豕邀里中少年若干輩狎坐轟飲酒正酣少年起請曰君儒者若是將何為焉唐慘然具以告願收遺骸共瘞之衆謝曰諾中一少年曰發丘中郎將耽耽餓虎事露奈何唐曰余固籌之矣今四郊多暴骨取竄以易誰復知之乃斵文木為匱復黄絹為囊各署其表曰某陵某陵分委而散遺之蕝地以藏為文而告詰旦事訖來集出白金羡餘酬戒勿泄越七日總浮屠下令裒陵骨雜置牛馬枯骼中築一塔壓之名曰鎮南杭民悲戚不忍仰視了不知陵骨之猶有也禍滛不爽流傳京師上逹四聰天怒赫赫飛風雷號令捽首禍者北焉山隂人始有藉藉傳唐事者由是唐之義風震動吳越聲生勢長若胥江掀八月之濤名雖髙困固自若明年已夘後上元兩日唐出觀燈歸忽坐􅯠息奄奄若將絶者良乆始蘇曰吾見黄衣吏持文書來告曰王召君道我往觀闕巍峩宫宇靚麗殆非人間有一冕旒坐殿上數黄衣貴人逡巡降堦曰藉君掩骸其有以報唐乃陛謁造王前王謂曰汝受命窶且貧兼無妻若子今忠義動天帝命錫汝伉儷子三人田三頃拜謝降出遂覺罔不知其何也踰時越有治中袁俊齋至始下車為子求師有以唐薦者一見置賔舘一日問曰吾渡江聞有唐氏瘞宋諸陵骨子豈其宗耶左右指君曰此是巳袁大駭拱手曰君此舉豫讓不能抗也曳之坐北面而納拜焉禮敬特加情欵益篤叩知家徒四壁惻然嗟矜語左右曰唐先生家甚寒吾當料理使有妻有田以給左右逢迎爰諏爰度不數月二事俱惬聘婦偶故國之公女負郭食故國之公田所費一一自袁出人固奇唐之節而又奇唐之遇兩髙之曰二公真義士義士爾後獲三丈夫子鼎立頎頎凡夢中神所告稽其數無一不合咄咄怪事乃如此唐𦵏骨後又於宋常朝殿折冬青樹植於所函土堆上作冬青行二首曰馬箠問髐形南面欲起語野􅍪尚純東何物敢盗取餘花拾飄蕩白日哀后土六合忽怪事蜕龍挂茅宇老天監區區千載䕶風雨又曰冬青花不可折南風吹凉積香雪遥遥翠盖一聲天上有鳯巢下龍穴君不見犬之年羊之月霹靂一聲天地裂復有夢中詩四首曰珠亡忽震蛟龍睡軒弊寧忘犬馬情親拾寒瓊出幽草四山風雨鬼神驚一坏自築珠丘上雙匣親傳竺國經只有春風知此意年年杜宇哭冬青昭陵玉匣走天涯金粟堆寒起暮鴉水到蘭亭轉嗚咽不知真帖落誰家珠鳬玉舄又成埃斑竹臨江首重回猶憶年時寒食節天家一騎奉香來南湖在餘杭縣治負山對城曠秀無比向為豪強所侵萬厯間復理濬湖豁然舊觀詳髙中丞碑記髙舉南湖告成碑武林山水聫麗而胥原止康以成沃壤必繇䟽導先喆經綸至今為烈其介在錢塘餘杭之中者名南湖漢熹平陳公渾所開也縱横一萬三千七百畆崇岡欝盤波光耀碧清暉暎帶氣候逓換形勝與西湖埓後漸堙塞唐寳厯歸公珧修之宋崇寧楊公時又修之而三賢皆載祀典按志天目諸山之水迸注苕溪分注石門港由石門港逶迤而入汪汪淼淼滙成巨浸是為南湖其下流杭嘉湖三郡受之盖若居亭然瀦積有區用以緩其澎湃洸瀁之勢不致衝潰難禦而暵旱時引溉溝塍三郡咸被其澤數百年來稱東南一大利藪矣嵗乆防弛濱湖諸豪為政臚割潢汙封殖益廣至扞三尺不顧𢎞正間水部臧公朱公皆欲奪以還湖議巳定汔無底績至嘉靖初侍御傅公始慨然以清復為已任然考碑亦僅還湖八千一百六十畆侍御還諸豪割據如初無何併其碑遷之黍稌髙廪穠桑茂樹逵軌如鱗臺榭相望而向所稱清復者不可復識矣湖廢則水無所歸淫潦既苦漫漭一遇亢乾又束手而仰雲漢庚癸之呼憤惋無所控訴嵗戊申杭郡苦乆雨連月不休禹杭而下水漂沒廬舎田疇以萬萬計二郡之民日蟻集轅門告災時水利王君往覘狀民之荷蓑笠以鏟斧從者千餘人隨車所向一呼而鄧林合抱綺閣連甍應聲俱摧如拉枯朽水勢稍舒衆俱跳號讙舞震山駭谷遂縛豪置之法而一時共事諸公咸蒿目焦心以興湖為急務矣不佞奉命撫浙偕兩臺日集所司條便宜郡邑長佐次第往詧蓄泄髙下故道及所為永逺計者既備且毖而費約巨萬括諸豪侵牟及三郡贖鍰苦不給有司議加賦天子矜憫小民俾無耗累黍而特允直指鄭公請捐傳犯侵尅袍服贓四萬為修復費聖主浩蕩之恩加惠浙土百萬生靈其有瘳乎於是相度湖勢除髙田七百四十畆有奇三分之二以補軍屯一以召民佃而其他菰蒲禾黍之區無問在官在民盡斥以為湖約如傅侍御清復之舊而止其立法也湖分四隅隅分二十井井分六十畆畆分十區每區計用夫若干里逓𣲖之每夫計領工食若干縣令頒之每夫領工食計汰泥若干四隅委官督之即用淤泥築十字長堤堤上蒔桑萬株使湖藉堤以為固堤藉桑以為固而桑與田所入皆官筦之以充五年一小濬十年一大濬之需庶亦免徴𣲖云堤勢綿亘建橋六所彷蘇文忠公西湖故事黿梁虹渚洄洑漣漪非徒増飾勝覽皆用調停注㵼而復於湖堤内設閘二以節奔湧堤外設壩一以防衝齧四隅各設夫二以察損壊仍著為令所在縣官課績一切以湖興廢為等差噫法至此亦可謂詳核無遺矣後之游者睇丹崖溯澄流疑以為神囂仙的應接不暇而抑知隆古以來開而塞成而毁剏營屢更曠舉炳煥豈易有今日哉功既訖牒上大司農具疏請大畧云南湖貽患城幾為沼民且為魚屢極三郡之災奚啻九年之水乃諸臣計畫一周告成朞月畚鍤雲集有如鬼䇿神驅庸調不聞更訝泉金雨粟金隄甓社永奠半壁於東南石堰髙梁嵗登千倉於原隰此豈竊息壤以堙洪水積蘆灰而止驚濤盖縁軫其咨之念備濟川之才牖户綢繆俾乂方割既經撫按具題合移咨吏部記録以修吏治靖宏圗云上報可一時臣工咸用肅欽奉揚休命将載諸貞珉以彰不朽而不佞敬集在事諸臣拜手颺言曰南湖之役賴皇上湛恩賢僚屬寅贊勿替臣預觀厥成俾利兆民鞏方輿與天地無極猗歟休哉曷亦念茲締造孔艱美成在乆彼豪躭躭巧以中當事者而威箝其下傴儛之及豈在一朝不虞為傅侍御之續乎敢告循良以永厥圗神祇上下實鑒臨之矣敬系以銘銘曰天目肇源石門剖絡瀦以安流震澤為壑潨濤湓激若𢷬戎兵師出以律甲騎雲屯千頃洪浸廼奠厥土按轡徐行吐納之府岸谷匪夷滄化為田狐嘷菁篠𧖟叢隰阡衆怒難犯翟瞿樊圃斧鍤奮呼滔天罙阻帝軫其咨蠲賚孔渥不日成之騰歡普樂疆理既定利賴無疆於萬斯年貽謀孔臧湖水清漣羣峯峭立佳氣鬱葱鞏固社稷武林梵志巻十二
