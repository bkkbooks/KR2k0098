僧雪峰誅茅重建其徒如月習苦積功啓大雄殿山門鑄巨鐘濬放生池居士王宇春黄汝亨沈守正為倡縁經年落成仁和令喬時敏有月明禪院額朗士吳之鯨有碑皋亭山在武林東北隅烟嵐晴靄供明聖湖逺眺孤秀可挹古徳耆宿徃徃托跡於此而上中下三塔最著上塔伏虎禪師真藏中下二塔則真歇清了月明清杲二師滅度處也二師俱左緜人同嗣法於丹霞淳公宋紹興二十三年丁夘朔日了呼首座曰吾行矣跏趺俄頃而逝杲時方作務聞之亦呵呵伏樹而寂兩公生同俗長同師不殊天親無著而去住無礙又似龎居士父子竒哉事聞於朝命使臣建塔於桃花塢即今處籓以禪室焚誦不廢入國朝厄於兵燹成化間復建獨下塔在山址樵蘇蹂踐榛莽迷離幾與丘垤讓卑矣禪師雪峰與徒冰輪俱杭人天性朴誠戒律精肅初遊五臺㕘名嶽歸訪杲公遺蹟慨然有興復志誅茅編屋不堊而堅入其門新潔莊嚴能歛人志而發皈依瞻仰之願依山以居者逺邇趣役累黍可積駸駸拓大而雪峰己化去氷輪愈厲苦拮据矢成未竟之業一以樸誠動人遂復構殿三楹前後廡宇鱗次繡錯香燈梵花法幢建鼓鐘磬之聲晨夕逹數里而百年來荒墟遂成珠宫琳宇矣徃歲辛夘余不佞與俞似宗讀書興教寺欽雪峰髙行時過㕘訪師一日指侍者曰此初懴皈誠者也昨日夜义頭今朝菩薩面夜义與菩薩只隔一條線聲音朗徹余聆之恍然心境清沁若有所㑹是歲似宗預計偕即成進士因與皋亭結久要而余南北分馳遂虚舊游顧夙企冰輪之能成師志而構茲勝果也非特法門龍象抑亦古刹棟樑歟頃左方伯桐城吳公亷其實與銘不朽而仁和邑侯海上喬公嘉與更新題曰月明禪院以標其額儼然月明杲禪師與山靈並曜法席之盛當世世傳燈未艾矣不佞因為述其詳而系之以銘銘曰曹溪肇源清原分派提心為宗何等無在慧筏渡迷金鎞撥碍杲師受衣空明洞解現示游戯大千同界遺蜕奚存真性不壞雪峰上首璞中圭外如月紹林堅忍于邁猊座揚輝紺宫映帶杲師何心成毁嗔愛以覺有情功隆埏載名山䕶持竹香松籟法華菴為月明下院近萬緣橋僧性廣建栁翠菴在下塔側有栁翠塔興教寺晉天福四年錢氏捨名興善寺伏虎歸禪師為開山之祖元末兵火煨燼朂法師重建名為興教華嚴菴在皋亭桃花塢興教松隠靜室也俞思沖題額僧清學焚修金佛寺宋嘉泰元年璋法師創業師湖州武康人父姓金母夢僧持花入室而生師自㓜辭親出家㕘訪知識勤修淨業士庶皈禮開禧三年寧宗召問佛法賜金佛寺額元至正六年燬洪武初僧正福重建至二十八年正福善能二師鼎建佛殿寢室雕裝三佛二菩薩諸天有靈芝花二盤古窰青瓶一對貫雲石書淨業匾元時銀杏樹左右一株二合俱存永樂間福精修戒行晝夜禮彌陀淨土期懴忽聞異香滿室告衆云四十八年住世猶如嬰兒游戯世間萬事皆空明月清風歸去書偈而逝無垢院在城北大雲鄉宋淳熙元年建元至正燬洪武初復建萬厯乙亥重建憲副林梓題額兩刼真修其序略云誌載宋淳熙間坦禪師奉勅建造至三代孫祖心者一修葺焉迄今盡圮僅存殿宇而已地方耆善訪瑪瑙寺有行僧亦號祖心謂為前祖心之後身也請住守焚修余自掛冠歸隠湖莊日與方外交遊而惟祖心師誠實可嘉是以為贈善曇寺去城東五十里在鼎湖西葡萄畈原葡萄寺廢經數百年其故址宛在萬厯戊戍僧如顯募衆縣宰豫章劉公嘉其德捐俸以助邑人胡心得沈朝煥沈朝􅏎丁周助建長河環帶古朩圍蔭有石橋鉢盂泉鼎湖寺去城東六十里在鼎湖中亦名東湖廢久無考湖大三千餘畆萬厯庚戌司道清復里人虞淳熙為倡構室以居僧海淵等將興崇殿以復其舊湖跨仁和海昌二邑于南西湖若鼎峙焉安隱寺去城六十里在臨平山南唐清泰元年呉越王建名安平有安平泉宋治平二年改今額元至正末燬永樂初重建其後即臨平山地生曲竹相傳丘隱士羽化棄杖於此其竹皆曲寺有寳幢歸併於此曰報慈曰圓滿院曰寂照菴蘇軾題安平泉詩聞説山根别有源撥雲尋徑興飄然鑿開海眼知何代種出菱花不計年烹茗僧持甌泛雪煉丹人化骨成仙當年陸羽空収拾遺却安平一片泉勝安寺在臯亭山北胡𦙍嘉記云臯亭山清澹渫杉松挿翠潭壑瀉注味韻清美予棲遊久之晉宋以來悟證者若而人黄龍伏虎月明諸古徳影堂瘞塔保而禪誦其間者迄今不衰其餘岐峰邃澗或綴一瓢或卓一錫皆有拔俗絶塵之想勝安介在諸刹中創自後周顯德􅃯名寶勝宋之乾徳郡人錢仁輝葺而廣之法侣道崇夜見白衣人來謁始立大士圓通道場建炎四年燬於兵手其殿竟無恙衆大駭異奉泥金法幢佛牙舎利供之紹興二年始易今名己不知其所由廢矣僧寶有麥秀之歎謀之兩世再起再罷其孫性乾少年精警跣足行募不踰朞而岧嶤熣燦幾與層巒爭勢矣廣嚴寺在臨平鎮西前挹鼎湖後踞丘山水朩清茂煙雲晻靄雜與氓㕓賈區相接而諠囂不聞按圖志舊名華嚴院晉義熙十二年法師通所建以奉華嚴者隋大業末燬於兵唐髙祖時𤣥覽法師始即其地而恢拓之鑄金銅像三百五十軀書金字涅槃經二千餘巻尊奉度置咸極莊嚴法師俗姓禇氏左散騎常侍舒國公無量之弟舒公少常讀書湖上有龍起之異既顯以太夫人年髙歸覲其鄉時從冠葢出游山中叙昆季之好人以為榮法師因請湖為放生池刺史袁仁敬禁民六里不得入網罟司馬楊敏言復禁十里魚鳥涵泳士民嚮風遂為一方之盛開元二十二年法師化去學士徐安貞為之碑㑹昌中寺燬碑亦堙没大中十二年寓士陸同芳濬井得石函華嚴經六十一巻遂名華嚴井捨宅為寺建塔以藏焉宋治平年中賜今額建炎罹兵燹其地沒為民居邑人姚成率好事者復之乾道五年僧行杲始營佛閣鐘樓元大德七年僧如岳増建前殿而門廡稍存其制元貞乙未平山林禪師棄家於茲受具戒遍㕘諸宿歴主名山藏楊宗乘為東南之倡由是寺之名益著元末兵亂尋廢正統十年節菴貞公與其徒日初昇合謀協力鳩工簡材撤而新之𢎞治丁已日初徒本浩復葺其圯壞云淨惠寺晉天福七年吳越王建號佛日院宋大中祥符元年改今額范成大詩云帆掠楓橋意欲飛西山雲物逺依依回思客路豈非夢乍聽鄉音真是歸舊事懶從年少問故人稍覺座中稀不須更説桑榆晚秔稻鱸魚也自肥蓮華窟在佛日塢蓮華峰之左脇僧大慧累石為基編茅為室因峰得名故名蓮華窟有石翼然如飛雲之狀名片雲巖有泉瑩淨潔白從石底細竇湧出味如醴蜜名天乳泉有池形如泮名半月池明覺院即明教嵩古道場也元末燬其基没於民間僧性澄於萬厯間清理六畆山形狻猊名獅子山有石龍在溪左右頭口相對而出泉從口流晝夜如吼名石龍又名雙龍泉有石窩其中可容二人趺坐名石龕有石在澗底牽如被幅長五六丈名交崖石龍興寺宣和七年因東湖水濤洶湧建寺名妙華菴立普同塔鎮壓水勢紹興六載髙宗建都杭州太后駕幸本寺賜額龍興元末兵火額石俱焚大安寺在臨平山北小林鎮梁貞明二年呉越王建定慧禪師為開山祖元末燬洪武重建二十四年歸併廣嚴寺改額為大慈院驀直菴在仁和念三都十啚僧大仙童真入道衆信歸仰丁姓捨地募建禮請焚修給事洪瞻祖顔其額彌陀菴在履泰鄉五啚嘉靖四十年里人李陽割地創建延僧如性卓錫其中嚴淨毘尼精誠念佛以荳為記滿四十八石臨終天樂迎空彌陀接引人遂以彌陀名其菴萬厯間孫海雲立禪三載刺血書經李應科捐貲重建司馬陳學易有記龍華菴在履泰鄉五啚萬厯十八年陶曉施地建延僧性曉焚修不涉文字惟勤禮佛司馬陳學易顔其額武林梵志巻四
