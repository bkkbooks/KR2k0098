body:
  text: 武林梵志巻四明吳之鯨撰北山分脉由湖墅至皋亭山香積寺在江漲橋北宋太平興國三年柯氏捨宅為寺舊名興福大中祥符間賜額香積門臨官河㠶檣徃來者日千百計秉燭猶喧一徑蛇行茂林蔭宻隱然城市異藪也妙行寺在夾城巷宋徽宗時有僧思淨者姓喻工畫佛人稱喻彌陀遂棄家學佛捨宅為寺以接待雲水二十年間徃來者三百萬衆故俗稱接待寺方臘之亂思淨語賊乞以一身代一城之命賊為少戢元季燬宣徳二年重建寺南為望佛橋寺内有布袋和尚像親筆題贊書法遒古張九成喻彌陀塔銘錢塘喻氏子生不茹葷少好畫學吳道子臻其能後專畫阿彌陀佛無為子楊次公喜之呼為喻彌陀世因以稱焉年三十五歲棄家學佛名思淨初禮開化定公為師次依靈芝照公祝髮二公皆有戒行而師所志甚逺不自以為足也即北城之外僦舎飯僧期以百萬日持鉢乞食不避寒暑心念精一人天歸焉不為經藏為毗盧大閣百鏡四垂互相攝入莊嚴雄飾儼若天宫庖湢井厠莫不備具郡移妙行院額以旌其勤屬方臘陳通之亂煨燼之餘妙行巋然獨存蓋雖賊不敢犯也至金人入㓂始焚之臘之來也師徑造賊壘願以一身代一城之命誠心感動賊悚然為之少戢每賊退師輙収聚遺骸大作佛事香花熏沐冡而藏之其志堅確表裏如一積久純熟不見間斷至於隨機響答自然殊勝有部使者問師能畫彌陀何不叅問師即答曰平生只解畫彌陀不解叅禪可奈何幸有五湖風月在太平何用動干戈師為兒時游西湖多寶山輙作念曰異時當鐫此為佛其後遂為彌勒之像欲及百尺使水陸徃來得以瞻仰門下侍郎薛公問彌勒見在天宫為諸天説法公於此鐫頑石將奚以為師曰咄哉頑石頭全憑巧匠修只今彌勒佛莫待下生求其他發揚應接徃徃如是嘗以般若心經句為一頌其所自得蓋不可以常法論也紹興七年十一月二十四日趺坐而逝年七十其徒塟於院之法堂之右前此僧有夢窣堵坡墜於地者有夢白龍升天者有夢衆神禮辭者噫此豈常人也哉度弟子二百八十一人師常以院宇未復為念既而弟子行超以判府丞相吕公之命甲乙相繼主院事行蹈建大藏水陸堂行速建僧堂二十間行全建法堂方丈巍峩蔽虧觀者動心其盛矣哉余錢塘人也知師為詳竊嘗悲學佛者比比而務實者何其寡也學律者以變古為長學教者以好勝為務學禪者以破戒為通其失佛意甚矣而師惟實是務不事虚飾搏空手齋三百萬僧架空地為大刹宇鑿空山為佛誓以有成不自有其善不自矜其能故人無不信者茲可尚也已行全來請銘銘曰大道不明誰辨西東卑者眩俗髙者譚空課其實效繫影捕風偉哉法師唯實是務飯無量僧建大刹宇捐軀贖命指石為佛厥志未已厥身己没誓千百生終底其成粤有法子克肖其父殿堂樓閣庖湢廊廡後先出沒為一佛土咨爾子孫勿墜其緒張浚贊喻彌陀掩遺骸詩刀兵刼海苦漫漫原野遺骸葬若干盡大地人須薦取眼睛突出髑髏寒趙鼎贊喻彌陀詩骸骨鱗鱗曠野昏天陰雨濕向誰論縱然有樂踰南面爭似無為實相門清了贊喻彌陀詩城市鄉村隨處走落花流水幾番春揚眉一笑憑誰薦四百萬僧齋主人蘇試水杓頌喻彌陀用以化縁其徒寶之杓柄長多少西湖水淺深本來無一物非古亦非今張商英贊喻彌陀畫丈六佛詩丈六金身毫端三昧精妙入神充滿法界善知衆藝得大自在游戯神通一切無礙恒河沙刼金剛不壞萬象森羅影現中一顆圓光非内外史浩喻彌陀偈攪翻十里西湖水化作四方八徳池淨洗衆生煩惱垢人人見自性阿彌法雲寺在武林門北七里許歸錦橋西餘杭塘之南草營巷五代晉天福五年呉越王建請餘杭安樂寺治禪師開山賜額法因寺宋英宗治平二年圓通秀禪師重建改賜今額寺内有宋駙馬都尉武勝軍節度觀察留後張敦禮捨鐘萬斛蘇東坡作銘内殿崇班馬惟寛捨拜石東坡作記元至正兵燬洪武九年善人沈勝請雙林寺鐡菴愚䝉極禪師重建正統間燬寺僧文珩圭璋白和尚重新殿宇嘉靖間倭夷入宼兵燬萬厯二十二年僧明慶智昂重建寺右有愚䝉極塔蘇軾法雲寺鐘銘并叙元豐七年十月有詔大長老圓通禪師法秀住法雲寺寺成而未有鐘大檀越駙馬都尉武勝軍節度觀察留後張敦禮與冀國大長公主唱之從而和者若干人元祐元年四月鐘成萬斛東坡居士蘇軾為之銘曰有鐘誰為撞有撞誰撞之三合而後鳴聞所聞為五闕一不可得汝則安能聞汝聞竟安在耳視目所聽當知所聞者鳴寂寂時鳴大圜空中師獨處髙廣座卧士無所著人引非引人二俱無所説而説無説法説法雖無盡問則應曰三汝應如是聞不應如是聽蘇軾法雲寺禮拜石記夫供養之具最為佛事先其法不一他山之石平不容垢横展如席願為一止具之用晨夕禮佛以此皈依當敬禮無所觀時運心廣傳無所不在天上人間以至地下悉觸智光聞我佛修道時芻泥巢頂霑佛氣分後皆受報則禮佛也其心實重有徳至是禮也願一拜一起無過父母乗此願力不墮三塗佛力不可盡石不可盡願力不可盡三者既不可盡二親獲福生生世世亦不可盡今對佛宣白惟佛實臨之元祐八年七月中旬内殿崇班馬惟寛捨定光寺初名福慶菴創自大梁貞明二年丙子杭州都督府錢塘縣節度討擊副使方銖同衆共造石幢一具鐫大佛頂尊勝陀羅尼咒於上其文略曰布金設象寶刹交輝土淨曇生宛如佛國現存後唐天成二年大為増創復昌於晉天福四年蓋呉越王因長耳和尚來居於此顯定光古佛化身遂改為定光禪寺在武林門外清湖中閘上關門巷内洪武五年天台僧惠珙重建至正統景泰間僧佛海昌昇等復建翰林侍講蔣廷暉書其額萬厯間水旱相仍竟為荒墟三十三年乙巳七月間黄汝亨倡緣重新之前後大殿鐘樓兩廡禪堂方丈鑄鐘設像汝亨有碑記殿前存古羅漢松栢各二株古井名夢泉石欄存偈天王後殿并東廢塔院古栢七株大槐樹一株冬青樹一株皆七百餘年物黄汝亨重建定光寺募縁疏定光寺去予家百武而近自梁唐歴晉宋代興稱吾里最勝覺地昔予垂髫讀書其中殿宇敞朗古松修竹掩映僧舎佛降生日士女香供禮拜紛集如雨今予折腰官下回憶讀書時僅三十年而雄殿惟餘荒臺叢林踐為豐草殘僧數衆敗屋幾椽古佛道場倐焉寂寞稱佛子者不無黍離之歎追惟我等均此覆載而或髙樓廣厦擬於仙居或風雨飄摇草棲露宿是誰所種而受報爾殊俗人不思其故遇可修為尚生慳吝可悲已夫長耳和尚為定光古佛化身天成間自天台來卓錫錢塘後居南山法相寺常募人作福或問和尚作福有何形段答曰能遮百醜由此言之醜於何作貪慳即是福於何生能遮即是減醜増美造自一念耳即以長耳和尚片言作定光導師可也我等賢愚貴賤信受斯語頂踵可捐何況錢幣是古佛寺不日成之于是寺僧方理捨念投體稽首行乞屬予重宣而作偈言稽首古定光普同十方衆是佛無古今還現於本人是福無形段遮醜即名福醜亦不自形慳貪即為醜願以無量光照破慳貪種一切諸佛相喜捨心所成如以長耳相莊嚴定光佛古佛所現處梁晉宋無二我願十方衆自信等信佛頂踵而可捐何况金銀粟寶山空手回百醜於何滅奉持斯語者親見古定光永慈寺亦名萬壽庵在烏盆橋路口僧宗宴慶秀募開義井建茶亭佛宇以濟徃來寒暑不輟杭嚴道費公堯年題額晏秀徃京師以慈忍堅苦聞於上召對賜滲金毘盧遮那十佛寶蓮座金像一尊並千佛旙紫衣袈裟五佛冠􅃯賜䕶國永慈寺額以歸建大殿供滲金佛八角亭供大士像並天王殿山門禪室慶秀復拓基為永逺之計云化度寺在江漲橋梁天監間朱异捨宅為寺名衆安隋改衆善唐改重雲再改承雲宋治平二年改今名旁有崇善王廟元至元間燬至正間僧若金復建寶覺豐樂寺名豐樂院在西馬堘内宋乾徳六年僧雪巖建治平間改為寶覺豐樂禪寺嘉靖間兵燬萬厯三十年僧寂學重建前有金沙橋左右有八角琉璃井後有銀沙橋阿婆蕩小土山茂竹顯教寺在武林門外東去里許宋顯仁太皇后韋氏紹興十二年自北歸至是辛未二十二年十月於杭州臯亭山建新寺成額曰崇先顯孝寺明年復於北關門外清湖閘東傍大河建菴曰華嚴以為别院乾道五年仍奉敇改今額後徙在城金剛嶺嘉熙間燬寶祐年間徙今所元末燬洪武初重建未幾又燬至𢎞治已酉僧智福復建萬厯庚子又燬後十年僧廣詢慨然有興復之志儀部黄汝亨為倡募誅茅拓地經營木石不輟寒暑者三載至壬子落成寺幽僻深邃若谷南北湖山隱映林樾清流四面小橋古路宛有東林虎溪之勝於北郊諸蘭若中獨稱幽絶殿之外去百餘歩黄汝亨建亭書華嚴經又以妙嚴二字題其居宋應昌題深省二字贈之後有池一泓澄注上有修竹古藤鬰翠如畫汝亨構三楹其下題曰得聽居詢樸真嚴於戒律善講所至法席充牣尤於妙法華經得三昧四方學人咸稱明法華云所註有觀所緣緣論釋義九喻詩諸游覽詩並偈頌若干首並行於世黄汝亨建殿募疏武林門外清湖閘中舊是華嚴之菴今名顯教之寺閣横山色何殊龍井之雲徑列松陰不減虎溪之渡自宋紹興而遞逺迨我洪武而重新諸佛之所照臨妙華於焉錯落萬厯庚子冄罹刼灰十載星霜竟湮蘭若諸天佛像淋漓風雨之場四壁僧伽殘破荆榛之地寺之不存教於何顯嗟古路之入幽谷豈當世而無善根茲幸詢禪師卓錫此間義闡華嚴之藏揮麈其上音傳寶樹之枝開晦以明居今作古發鼎新之至願為衆信所皈依𢎞道則覆十方布金僅需五百敢告聿來檀施成茲最勝覺場一文一合萃衆寶於香林出力出財絫微塵而山嶽俾夫大方廣佛從一切願海而交通蓮座香臺與億貝心珠而並耀見在勤修之徳分明作福之形各破慳心咸歸淨業謹疏劉曰寧送詢禪師歸武林顯教寺詩去去東林社還從天目遊佛燈螢火夜别語樹間秋野葛諸方論飄蓬半世愁中原誰法眼駒䜟本南州虞淳熙贈詢禪師詩梵林綠雪駐雙輪似有神光隔玉塵門拂桐花迎白鳳塢飛桃葉駕青鱗少陵競採千金實望帝遥思萬樹春更莫經臺摇麈落横山明月正留賔曹學佺宿顯教寺詩橋頭山渺渺栅口水漸漸月没來時盡霜濃坐後添教原分顯宻徑自入華嚴今日遊仍處能於勝地兼釋廣詢得聽居歌詢也平生怒浮俗拄錫如鑱鬼神哭曽把淒清風雨竹種成个个臨池玉黄郎自是靈山囑為䕶空門就林宿月明半在山之麓醉歌竹枝露如沐歌罷支頤仍瞪目責予不縛林邊屋詢也日中食不足那有餘藏趂餘欲黄郎知我同骨肉為結幽居對深緑涼風不使羲皇獨天花粉散琳琅馥靜聽心與虚空觸虚空發聲晤髙躅福壽寺在西馬塍望佛橋西南俗呼為東隱齊梁朝有神僧寶掌禪師飛錫過汴游浙見林深地僻景勝形奇即挿竹為精藍之始唐貞觀七年少卿夏公恢宏梵宇題曰東林五季末殿宇寥落宋嘉定間復為鼎新元復燬皇明鎮江南峰義禪師杖鉢游此重建成祖文皇帝有贊其略曰緇門總卒樂以優優至成化丁酉歲姑蘇半塘寺僧大章捨資建天王殿嘉靖乙酉山西老衲鼎建西方寶殿陳秋閣新秋宿東林詩閒來棲野寺涼思快髙情露冷絺綃薄天秋枕簟清蒲揮逾玉麈蓮飲勝金莖翠竹摇詩榻孤眠憶友生陳寄南過東林詩生平躭寂樂曳杖入東林寺外青山繞階前黄葉深浮雲知世態澄水見禪心坐覺塵紛逺唯聞鐘梵音大覺禪院去武林門北可十里在北關徳生巷唐憲宗元和二年𢎞辨法師建額曰大覺禪寺檀越蔣安王諒捨地計一十六畆五代周顯徳間燬元武宗至大三年詔舉烏石山僧世愚重建正殿天王殿法堂等後栁塘和尚拓以禪窟方丈僧寮修觀演義養老涅槃諸堂春秋開講冬夏坐禪四方宗之靡不風嚮元季燬於兵燹洪武十一年用環璩法師欲崇奉大圓鏡光普門像復作大閣雄麗壯峙工與像稱都人作禮因敬生悟俗稱大覺院亦名觀音院成化間僧無心道鑑重葺嘉靖間島夷入㓂廢僧徳明尋又恢復迄萬厯三十三年歲癸夘僧圓神重建戸部主事晉江蔣光彦助緣落成撰文樹碑寺舊有東坡鼎趙松雪手書十可山房叅寥子手書覺路元僧栁塘手種長松百八株並廢於嘉靖間惟大佛三尊諸天等像皆吕侃屠玉瓚名蹟及大圓鏡光觀音鏤像雖屢經刼燒而巋然獨存唐憲宗御製贊朕聞天之為大也上下之容可紀地之為大也縱廣之數可推則知無去無來不生不滅拯沈淪於沙刼救焚灼於塵區毒龍懼其威光强象憚其神力其大則包於宇宙其小則隱於毫芒七十二圜先有陶鈞之内萬八千載即為俄頃之間漢日載其通輝周星彰其降誕鷲頭峰下演金口之微言雞足山前舒玉毫之瑞相干戈不用梵志摧鋒甲胄無施波旬潰弤闢圓明之淨域啓方便之禪門慧晷耀於昏衢慈雲清於杇室無得而稱其惟大覺乎中峰大圓鏡像贊心鏡光明皎如月聖人智體無生滅一念纔興即現前古今凡聖相融攝唐宣宗皇帝問𢎞辨法師機緣帝曰禪宗何有南北之名對曰五祖𢎞忍大師在蘄州東山開法時有二弟子一名慧能受衣法居嶺南為六祖一名神秀在北揚州其所得法雖一而開導發悟有頓漸之異故曰南頓北漸非禪宗本有南北之號也帝曰云何名戒對曰防非止惡謂之戒帝曰云何為定對曰六根渉境心不隨緣名定帝曰云何為慧對曰心境俱空照覽無惑名慧帝曰何為方便對曰隱實覆相權巧之門也被接中下曲施誘迪謂之方便設為上根言捨方便但説無上道者斯亦方便之譚乃至祖師𤣥言㤀功絶語亦無出方便之迹帝曰何為佛心對曰人有智慧覺照為佛心心者佛之别名無形狀非青黄赤白男女等相在天非天在人非人而現天現人能男能女非始非終無生無滅故號靈覺之性如陛下日應萬幾即陛下佛心假使千佛共傳不㑹别有所得也帝曰祖佛既契㑹心印金剛經云無所得法如何對曰佛之一化實無一法與人但示衆人各各自性同一法藏帝曰何為頓見何為漸修對曰頓見自性與佛同儔然有無始染習故假漸修對治令順性起用如人喫飯不一口便飽是日辨師對七刻賜紫方袍號圓智禪師仍勅修天下祖塔各令守䕶錢德𢎞懷大覺上人詩借得僧房一榻眠凍雲晴日照寒氊己知有像俱成幻悟得無生始是禪碧眼比丘能佞佛白頭居士且譚𤣥懷人只隔西湖水沙上鳬鷖自洒然李日華題覺海上人宴坐處詩一漚復一漚起滅何時休風靜孤月現空寒萬國秋鄒迪光十可山房題壁縱横不如李子宛轉頗似模稜今日一椽為蓋他年五嶽擔簦智果院在武林門外東關六里舊為宋東山萬壽寺寺敞可容數百僧四面環水蓮花盛時香聞里許有亭臨其上曰白蓮亭外有涵虚鏡水二閣中有白蓮橋米芾題且喫茶匾元末兵燬其地盡入民居洪武三年智果僧文於舊基得觀音像一座三焚而不燬者未辨為幾百年所遺因建殿為供匾曰智果下院俗為觀音菴萬厯七年僧明繡拓基以廣其制創大法堂萬厯戊申僧海成照心復捐資闢地濬池種蓮作亭以追舊蹟路建大山門曰萬壽遺踪王穉登過訪詩禮佛歸來道路賖海雲猶自濕袈裟鰲身駕海千尋雪蜃氣成樓五色霞月滿吳門􅂓駐錫秋深作伴好還家門人若問南游事曽見支那小白華永寧菴去武林門十里芳林鄉沙河關萬厯間雪浪法師建接待十方雲水檀越陸雲捨地中貴劉成為䕶法里人沈文助建翰林呉應賔題曰慧海津梁西方菴在艮山門外五里餘雲棲寺僧廣明卓錫於此飯僧十萬復捨已地以擴充之本師手書其額晝夜持佛號不輟口四方衲子藉為依焉廣教寺在北新橋東晉天福六年有肇法師始創呉越王建舊名傾心宋大中祥符間改今額慶元六年密印法師重修有雨花堂説法臺元季燬洪武四年僧智海重建基址寛敞前後印堂田八十餘畆寺徑松林六十四丈後有土山三層上苦條樹大可五十圍出武林門先見此樹景泰間僧覺徴潛心文墨博通經史註纂百忍箴行於世其板今存府庫以鉢資築江漲橋華光橋塘棲跨塘橋朱鏞書碑嘉靖年被倭患日漸侵廢萬厯間查理廢寺産額保里舉僧正祈承業惟跬地破椽而己祈贖置基地二畆建佛殿三楹萬厯丁未孫通曙重建千葉寶蓮大佛周圍小佛千尊僅延香火云陳璇徴法師像讚貌古而神清膽雄而志宏其存已也活活落落其行事也烈烈轟轟其學博也則因百忍箴而見其功顯也則造五道橋而稱律法條章講論而明聖賢義理遵守而行在當仁而不讓但有為而必成禪講叢林之寺院倚之而紀綱益振衡台宗門之教法得之而箕裘克承是不忝從佛國出古庭而受經抑不愧為大報恩重開山一代唯菴之上足續傳世之真燈也陳璇詩三生石上長青苔春日誰登般若臺痛殺湯休從此逝不知惠逺幾時來風清浙水空杯渡雲歛英山寶地開綠竹青松猶滿眼可憐消息斷蓬萊毘陵胡濙源詩歲暮因過水際村維舟重過舊游門㸃頭頑石依然在説法髙僧已不存夜榻自來明月影春庭空見綠苔㾗我來多少傷懷事留像挑燈與重論苕溪徐祚詩雨花樓閣化烟霞甘露泉頭即是家簷蔔結成霜後未枇杷開到雪中華也知寂滅纔為樂始信浮生自有涯寫得舊時行道影不教塵土涴袈裟昭化寺去城北七里潮王橋東南唐長慶三年建舊名龍龕吳越王復建於後周顯徳二年宋大中祥符間改賜今額舊在芳林鄉河北中界紹興二十三年官以其地建倉屋遷寺於兹地傍有潮王廟元至正十九年兵燬