花春時山家焙茶香聞十餘里亦清勝冠諸叢林矣因題曰二雪堂永興有緣不減蘇學士三過矣寺後有方丈名安樂松軒是不佞所書厨下井名聖泉雲間陸尚書樹聲有淨界莊嚴題中江莫如忠所書俱名筆足與寺千載宜記佛慧寺在履泰一啚晉天福七年普覺明一禪師開山有碧沙泉今在山門左為法華祖師道場因名法華山永樂間比丘本源文達禪師重建正徳間燬都督萬鹿園為外䕶圓杲祗園法師闡揚宗教皈依雲集請龍藏水鎮梵刹建閣修葺煥然一新月溪圓朗相繼薫修下院名圓通菴在六寶村别院名白業堂文徴明詩法身曽趂木杯浮又駕慈航月下游出世不求千歲藥汎溪長載一輪秋桂香飄處清禪夢影低時歇棹謳物色由來總虚幻何須重看海中漚王世貞詩吾師福慧悟來深萬字從胸衆所欽趺坐俄成水月觀繙經忽動海潮音塔因聽法名多寶田為酬恩字布金功徳總髙何所冀翛然一鉢下叢林皇甫汸詩開教逢鳩什談經得馬鳴坐中窺有相言下了無生法雨和香氣天花落梵聲歸時多寶就列石為垂名王問詩臺殿參差映海霞黄金髙座禮袈裟一燈散作千燈影到處人傳講法華文彭詩貝葉西來今幾年何人解悟得真詮老僧説得天花墜寶塔騰光法鏡圓張鳯翼詩支公説法處寶塔夜光懸蘭若干峰雨香臺一縷烟慈航超苦海蓮火照迷川我欲聞鳴磬來修靜者緣薛應旂詩人天無住著䆒竟有真詮面壁應難悟繙經孰可傳徧尋何處遇普渡亦須縁憶在吳門别重逢不記年陸樹聲迎月溪法師升座講四十八願偈盡十方世是彌陀願盡衆生心是法界海衆生念念入佛復念念不屬衆生是彌陀願滿入法界海竟王世貞白業堂記白業堂者故講師朗公所立也朗公之同母兄曰祗園俱少而離俗負大智慧三藏經論總持若槖復相與㕘五臺伏牛諸耆宿為秀法師上足尋駐錫於杭之碧峰山當是時祗園振法席而朗公佐之塤篪倡和不為異宗方之世親之始殆有間矣祗園示寂法席愈盛諸襯施雲集朗公不以充衣食供而買地碧峰之址大約畆三十而微剪棘夷塊中為堂五楹左右淨翼之後為齋厨浴湢四周髙墉曠潔靚深竹樹匝列陰森蔽虧結夏解夏無非安地時郡守新都呉君請公室而樂之顔其楣曰白業志淨土也夫業不過二端淨穢而已諸淨行種種深淺不一而皆歸之淨諸穢行種種深淺不一而皆歸之穢淨而至於白所謂純潔無疵淨之至者也然猶得以白而擬之以業而證之即令不思善不思惡了悟妙明本性無法可修無佛可作何白可擬何業可證哉朗公未五十而示病現化其門徒真相如蓮性印奉遺體瘞於堂之前而塔焉因介王徴士百穀來請記余舊嘗識公頎晳而長面若滿月每升座説法巍巍金山海潮之音聽者驚悚宻意殷勤惟余是屬余今安敢辭第朗公之業余不能深窺其􅃐而為之弟子者羯磨精進勿替朗公之志以無業為白業可也夫堂則一幻地而己矣報先寺在西溪履泰一啚又名明覺院呉越王建歲久傾隤萬厯間重建殿佛并像有恒如禪師習天台教三十年不出山誦法華六千部真覺院在錢塘履泰三啚地名桃源嶺山向盤旋地臨邃寂古蹟桃源居嘉靖三十八年間僧真龍號伴雲捐資建孫淨源性良性純海月重修俗稱伴雲菴亦稱桃源居改名真覺院豐禾菴在仁和縣二十三都一啚董公莊西梁貞明間栁明王捨宅為菴保一方風調雨順五穀豐登故名豐禾菴栁明王即為本菴䕶法一境土穀遺像巍然在焉萬厯十五年風雨傾圮本境士民請僧行洹建造佛殿並華嚴樓金中丞馮司成俱題額慈嚴寺在安吉三啚雲泉山下晉太平年建慈泉寺在長壽一啚廣福寺在長壽二啚寂福寺在長夀四啚定安寺在定北二啚定明寺在定北三啚金蓮寺在定北一啚棲真寺在定北四啚無諍寺在女南一啚元時建禪智寺在女南四啚宋時建法性寺在崇化八都下九啚呉越王建真寂寺在八都下九啚宋寶慶間建萬厯甲寅僧廣印移建缾窰接衆印字聞谷㕘悟堅猛真禪那也大雲寺在奉口唐貞觀間建重興寺在靈芝三都宋徽宗建荀山寺在靈芝三都八啚元至順中建廣化寺在萬松山相傳寺側有沈約墓聶心湯重興萬松山廣化禪寺碑云萬松山誌載鳳泉山在宋為圓通大覺璉禪師駐錫處有錫田碑􅃯至元間妙明廣濟普福大師淳紹由正續院來住茲山構大伽藍聞於朝賜今額勑碑四襲其二剝蝕不可讀其二與寺記塔銘皆可攷寺所繇來者逺而其所部轄尤夥不獨一正續也餘杭武康長洲崑山比比咸有獨正續介在歩雖沒民間基址具存去山不二里又有金龍山淨安院宋白雲覺禪師道場僧廣隨居焉隨雲棲弟子宗教無不圓暢逺近稱仰里人謝君錫等請隨住持徒衆叢集以舊居湫隘不可容樵蘇不給宋司馬馮司成及其師蓮池各助金為倡贖山田若干畆給帖蠲其役次創法堂禪堂齋堂方丈庖湢稍稍建置浸假而増益其所未備焉夫以宋元舊刹向之銷歇沈淪於民間者不知經幾年歲今幸一旦巍煥聿新臺殿碑幢復還舊觀廢興豈不由人是為記淨安院在金龍山宋宣和覺禪師始創白雲菴毁嘉定四年僧智雅建紹定五年請今額又毁萬厯已夘僧廣隨重建錢塘令姜召有碑記正續寺在常熟鄉宋無凖範和尚開山聨溪紹禪師重興光宗御書額曰萬年正續元黄溍撰聨溪塔銘寶慧菴在龍鳳山金龍山之陰宋紹興建景定重建賜額有碑記禮部出給公據又臨安府帖碑圓覺菴在游漾塢鳳泉山北宋朝賜額有碑記東明寺在安溪大遮山前建文君為僧至此有遺像長慶寺在女北唐光化初建寶林寺在崇化七都四啚吳越王建東蓮寺在崇化七都五啚宋時建萬厯三十五年重建聶心湯碑云太璞山之南有蕭刹焉其始剏者南宋時僧智深也僧本郡人受法於常州華藏元禪師後歸覲結菴兹山沙門雲集遂拓為寺日與談宗旨見為獨利上根弗普弗徧非西聖接引意也復建彌陀殿約諸善信同修淨土效晉逺公東林蓮社故號東蓮云由宋入國朝晨鐘夕鼓香雲弗絶迨值繇役繁重緇衣染公府之塵叢林苦吏胥之擾産蕩僧散猿啼狖嘯風雨之所漂摇僅見落葉荒苔數椽朽屋而已里中朱廣文等惻然動一笠之想圖恢復計聞臯亭悟空塔院僧淮者有戒行雅負幹才禮請卓錫而望殘燼復然可不謂盛舉乎淮懼緣難驟結閉闗以待然而衆樂為助布金施粟不脛而至因命衲子性𢎞徳等庀材鳩工鼎建佛殿前為山門左齋堂右禪室厨庫湢浴鱗次一新進惟東蓮絡繹奔赴歴世墜緒不三稔而還舊觀何其易若承蜩也予思政虎賦蛇脧脂剜肉即名閥鉅姓箕裘漸見霣零矧琳宫梵宇聚散摶沙者邪有人焉為之軫念倡義捐資勰謀起廢則嚮之鞠為茂草者煥然金碧輝煌矣遞廢之故縱曰刼數詎非人事哉噫産叢具在去珠復還願後之人有増無損不至翦焉荆棘不亦慈悲宏願功德無量也乎用紀顛末以昭勸戒妙智寺在八都上四啚俗呼杜甫廟宋大觀建智勝寺在下扇三啚寺左有白泉味清冽異常内泛白星觀者相汲不絕黄汝亨贈伴雲詩衣帶南流水風波去棹遲雲光沈梵閣山色澹江湄寺有髙僧偈詩慙學士題漫云無可坐空際白雲期呉之鯨泉浮白詩短篙撥烟汀沙曲驚鳬鷖茂樹跨丹虹步屧支青藜甘泉出乳竇玉友勤提擕荳香猶帶露笋滑初穿泥采真貴㤀歡齊物悟幽棲吾生盡如此浮湛胡足稽廣福寺在北隅一啚東晉建觀音寺在餘杭塘北舊名觀音妙智院宋開寶間張彦捨宅建正等寺在調露二啚唐天寶間建仁壽寺宋建報福寺俱在調露鄉佛日寺在臯亭山北為明教嵩禪師道場近桐叩寺前有渥洼池徑下有大松二株皆唐宋舊物寺廢土人斫伐時見幞頭紅袍者惶怖走避至今存萬厯間重建亦名佛日塢溪流屈曲叢朩交映水底怪竇如瑪瑙色細蒲翠滴至此竟日㤀返塢盡處有大洞如屋亦仙境也天王寺在仁和縣東一百里宋髙宗紹興年間建名永寧菴理宗淳祐四年法雨講主請勑賜額天王院元末兵燬洪武初復建更名曰寺保江寺宋乾道年間建元至元間燬洪武二十年重建西隱寺離城八十里宋乾德元年建元末兵燬洪武十四年重建慧日寺晉開運元年建名光照寺在孤山南宋祥符八年移至博陸改今額元末兵燬洪武十四年重建純一院宋嘉定年間勅建元至正兵燬洪武二十四年立為叢林有下院曰慧林菴萬壽菴在博陸村萬壽橋側慧日天王保江西隱諸刹跂峙博陸皆創於宋燬於元復興於明惟慧日則建自開運然從孤山下遷易今名亦自宋始也資慶由長壽村移博陸不知何時載復載圮已沒於蓁蕪瓦礫矣而僧如圓改築西水儼如雙林廢興非獨人事亦有緣感矣武林襟帶之水至博陸而與檇李代迴環盤礴欝秀之氣若聚固宜諸刹鱗起也胡𦙍嘉題資慶院宋建炎間創元末兵燬景泰三年重建嘉靖四十五年復燬萬厯三十一年間上院僧守亷請禪僧如圓移築塘棲胡𦙍嘉募造大雄殿疏云資慶院之廢土人幾不能舉其名至圓公始復之佛無莊嚴之殿僧無老疾之堂與余謀之三年未飭材也辛亥仲春來謁余疏余曰何遲遲也曰凡吾所謂緣實難鳴鈴擊柝以號衆借縉紳先生之薦牘甘言以市人不可知之人余勿能也余為其信者而已余歎曰非獨子有不能佛亦有不能佛能度無量有情而不能盡衆生界能知羣有性而不能化導無縁以佛之不能加子之不能毋怪其難也雖然子為其信矣信者超死生之根本也何論縁事阿含經曰補理故寺二梵之福此曲誘下機之語真具上根信者斷臂刺血亦無所愛豈福利之足言即余今為子作疏如不具信力而言其所疑縱舌繡筆花不免於六十四種中軟語綺語之業况以導人之信哉子既為其信矣子可無疑於緣矣有普同塔放生池清流禪院在塘西里仁橋北元至正年建清流亭奉議大夫兼翰林院侍書蔣暉為天竺傳天台教觀住持閒中叟無相立正德年僧大一募贈方伯沈存濟地建祈堂觀音閣藏經函閣中萬厯間經軼閣圮僧海潮立募三年闢為叢林飯僧無數易今名太史董其昌額其堂曰梵網珠又題曰有禪淨土祈堂舊宇則僧同涵居也普濟院俗呼觀音娘娘殿居棲水之西市世愚悞稱泰山娘娘非也嘉靖間有倭警火及於殿見白衣大士合堂演咒出梵音以是垣堵無恙其靈現從來乆矣華亭袁福徴記徳雲菴初不知所自始天順間僧志詳莊嚴遺像於座下得書一緘云宋末元初戎事始定西天目山中峰祖師舉棹江湖船居十載南抵錢塘北游蘇秀乗此光風霽月鑑水平波優游涵泳而樂道也因泊船唐棲鎮下鄉耆李誠從師慕道乃於隴右平區修築幽居以為祖師祁寒盛暑燕息之所子昻趙公相與徃還論道匾曰徳雲菴有詩云舟停蘆月渚僧憩徳雲菴之句又云伽藍基址佛殿僧堂乃是聖朝土脉古德嘉猷昭於千載之久福裕斯民者也後嗣宜遵先訓緜福祉於不朽庶幾不昧其肇矣乎按書是居士李誠為中峰祖師創以供游息者也書不知何人筆亦元時住持此菴遺訓後來者今僧如曉熏修其中在塘西南介河去市五里永清禪院在塘西北三分村宋紹興間延法師剏元末兵燬洪武初復建玉音實錄見存大圎菴去塘西十里許在龜馬山之間古林講師塔銘畧云師諱曇茂字古林於西石崗開治平壙建觀音殿周以房屋竹朩雲翳昔之殿宇門廡煥然一新今春秋八十宛若少壯度徒一十人預營師歸藏石塔於菴後師曰逹摩老子强要東來使我如何又要西去去則去且留此骨權作話頭後有幻人道古林禪師在此予愛其言而銘之銘曰生八十年作千萬善心心菩提種種方便釋迦老子只此一念持此一念四海周徧雖曰周徧又不可見有可見者藏骨之塔示未來者尚其有覺成化巳亥秋九月進士張天錫撰化城菴古井尚存井欄刻淳祐元年四月上旬惠塔主置門榜化城深處趙孟頫題泗水菴西水胡𦙍嘉撰重修泗水菴縁疏云余家西水不堪近市之囂雜每棹小槳攜茶竈泛葭葦荇藻間終憩泗水焉若超陟之顛迤邐入臯亭尋黄鶴則又以泗水為推輪矣其水為泉規之若井其下穹然不知其方廣也履其上穹然者如鳴箏撥阮鏗鏘而應汲瓶落手蕩激以去非綆繘可繚而得水味不敵錫之慧金之中泠澄之以清和有韻不敗茗色背負小阜連岡突石可眺可遊接阜以徃中斷為峽林朩陰蔚紆杳而入恍異人境若夫鳩鳴夜月雪霽冬松花濃葉赤人寂徑清即謝有東山之勝陶愛匡阜之幽亦足埓矣然余於是更有感焉字水以泗其山為龜為馬峙於左右東魯河洛之遺事也此必有人焉慕其風而錫以嘉名以為隠學棲槃之處碑沈志逸不復可致此一感也水為名泉邵康僖諸老煮茶賦詩以板其上先哲勝風慨焉可追又一感也中之佛宫髙敞樸質自徃代禪誦薫習能發人志意又一感也余徃時與卓去病兄弟捐資葺其圯樓後為惡僧醉飽所敗廢置踰時戊申之秋始延鑑如上人來主其菴鑑如文弱有行力収遺椽而整之則葷穢之塲可還舊貫向所云碩儒企東魯之踪韻士理鴻漸之訣法侣開蓮花之社皆於是菴趨徃焉非止一福田利益之事而己余故手書疏語以告四方同調之士共發誠願並告鑑如至心勸成勿生疑怠邵鋭詩棲溪老人鬢欲華杖藜方外謁袈裟雲端度嶺青天近松下乗風白幘斜峭壁坐禪飛錫杖空堂演法雨天花明年此興遲今日重到南山看採茶丁養浩詩絶頂清新逺物華一塵飛不到袈裟松髙百丈穿雲出竹壓禪闗帶月斜野鶴有時閒教子老梅無語自開花相逢莫問人間事紗帽籠頭且吃茶廣濟菴在唐棲長橋𢎞治間太皇太后周及武宗皇帝欽賜御寶無量壽佛並帑金四百五十兩建尚書屠滽修撰錢福有碑記萬厯癸未重修殿傍建普同塔先後僧方毓顯林募成崇勝寺在奉口峨嵋山南宋淳熙建元至元初燬至正十二年重建元末又燬洪武十年復建二十四年立成叢林寶華寺在芳林鄉㑹安村宋乾道間馬宗浩捨宅為菴名為寂慶寺嘉泰間重建淳祐七年移請今額元末燬洪武十六年復建普濟寺在大雲鄉獨山西宋治平二年建元末燬洪武初重建崇覺寺在城西北泰溪村元至正初建十三年燬洪武三十四年重建興福菴在城西北仲溪鎮北元至正初建十六年燬洪武元年重建二十四年俱併崇聖寺普寧寺宋朝勅建天順二年于忠肅公聞於朝勅賜萬歲龍牌清鼎供器一副金字大普寧禪寺匾後寺頽僧絶萬厯戊子吉祥寺僧真實重建講師葦杭説法其中二十餘年師金陵人朴真和朗為逺近所宗馮夢禎為像贊黄汝亨為銘記塔在奉口廣化寺普濟院乃普寧下院普寧飯僧渡河寒暑濟舟為難僧海珵於南岸修造鴨欄橋於橋下建菴飯僧徃來便之昇平廟在横里保係虎林玉泉寺下院分僧焚修其中圓通菴在鼎湖之南宋朝創元時燬嘉靖二十二年重建復圯萬厯丁酉僧大潮募修泰清菴在臯亭山南丘家橋萬厯戊戌雲棲僧大柔建定心菴在黄鶴山南海塘萬厯甲辰越僧性海募建資福菴在黄鶴山南張巷村萬厯癸已僧廣智募建普門菴在黄鶴山南馬家埠萬厯甲辰歲僧如山募建膝泉菴在臯亭木塢左僧海澄實真構室於此錢王鏐以膝跪地泉即湧出故名黄龍菴在黄鶴山大宋黄龍禪師開山元時兵燬隆慶年圓澄禪師構茅屋以居四世下僧如謐號超然㕘悟其中題其閣為惺惺閣嘗與髙攀龍呉志逺輩坐玉如潭七日而悟拈題即能詩詩多不具載募造佛殿方成而没沒一朞而其徒無淨毁賣於民家古松翠竹一時俱盡僧如謐秋日山居詩日日生涯谷口柴村童負米去還來種園野外留花朩接水空飛下石臺崖上翻紅楓葉老江中吹白荻花開平生獨有滄浪興欲作狂歌愧短才秋日懷胡休復詩君去寂寥在秋來黄葉深溪清寒客思境淡養人心古樹依山瘦飛霞落水陰斷橋一片石孤影獨相臨龍珠菴去郡城東北三十里在龍珠山之陽唐宋古刹傾廢難考惟故址猶存左有古松右有龍珠泉雲棲僧成意於萬厯庚子重建大覺菴在黄鶴山之陰青草塢僧大賢於萬厯戊申歲卓菴以居巧山菴去城北三十里係古刹宋髙宗七夕駕幸其山因命名曰巧山林雅菴在黄鶴山之陽僧義蘖於萬厯丁未歲建圓通菴在黄鶴山之陰青草塢僧應堂於萬厯丙午歲建永慶禪寺去城東四十里在黄鶴山之陽今稱龍居灣唐清泰間建元初年燬萬厯間安隱寺僧如良等十人買故址構禪堂殿宇前有沼後有泉計百五十畆方伯呉公賜永慶禪林額朱國禎詩有序自天目而東最尊者無若臯亭之黄鶴峰直黄鶴稍曲而菴者曰龍居面海臨谿舟騎絡繹雲游荷擔者尤多菴燬於倭茲再建居士偶尋山過之風雨停一飯作三詩其一曰名山游已徧此日到臯亭鶴下棲雲白風髙望海青僧歸老祗樹客逺舊禪燈莫問朝來雨還堪夜摘星其二曰誰是歸依地青山合有縁風聲調石磬雲氣落松烟不語僧持咒從空佛結蓮今年老居士投足近諸天其三曰冒雨來投此蒲團正可依山深非寂歴燈影自光輝雪嶺看河近天花對雨飛一聲黄鶴下夜半有僧歸僧知其宰官也持册求文凡五月未有以應茲來索不得再辭又作一詩歸之此亦方便法我輩老年應法只宜爾爾皋亭峰勢倚層霄臺殿陰陰路轉遥山色烟籠禪喜窟海波時漾虎溪橋秋風逺水來新客明月長廊隱舊寮自有象龍圓法相不愁檀越驟難招李流芳冬日過皋亭龍居灣宿永慶禪院同一濓澄心恒可諸上人步月二首歸装出西湖間道向黄鶴屢愆桐塢期偶遂龍居諾輕舟凌晨風遥山滿晴郭丹林尚可數寒條紛無託披松指微徑聽水捫暗壑新構爭逺勢平臺攬摇落霜後