花鶯引去壊簷無幕燕歸來寂寥誰共樽前酒牢落空留案上杯我憶故鄉歸未得可憐鶗鴂重相催范仲淹顯聖院詩登臨溪上寺遷客獨依依逺水欲無際孤舟曽未歸亂峰藏好處幽鷺得閒飛多少天真趣遥心結翠㣲南山普寧禪寺在縣東北三十里常熟鄉宋白雲通教大師剏庵以居隆興間改庵為院曰傳燈又改普安淳熙七年改今額元至正末燬洪武三年重建歸併于此曰慧照塔院在縣東北三十里曰定一院在縣東北三十五里曰松隠庵在縣北七十五里慈聖寺在縣東北四十里常熟鄉名靈嶽肇於唐五代天成元年復建宋治平二年改今額元至正末燬洪武間重建歸併于此曰永夀寺在縣東北三十五里曰安衆寺在縣東北四十里曰西教庵在縣北三十里歐陽詢慈聖寺記畧杭州餘杭縣西北有鎮曰曹橋鎮走北十里得精舍曰靈嶽後漢建武二年有周閩越王無諸十二代孫摇氏捨宅之所建也光孝寺在縣閒林東扇一啚陶望齡光孝寺碑記光孝寺唐蔣山太平興國禪師建太宗勅額迄宋而寺貎幾灰矣端平二年住持法薫德力不减于初彬彬稱盛左右丞相咸為篆石迄我皇明而寺貎又幾灰矣幸正德元年無盡和尚禱雨龍門之山太白龍王獻白蛇于鉢内而大雨灌溉萬民繇是寺貌復興寶夀其别號也左通西溪勝槩右逹赤松名林前有龍門峻嶺後有閒林幽村内不見寺外惟見雲古井甘泉詩脾可沁萬厯間如清真聴重修建天王殿樹鐘樓置山贖田為永逺計誠大福地也徑山興聖萬夀禪寺在縣西北五十里唐代宗時僧法欽結庵於此永泰中有白衣士來求法度為沙彌欽指坐後石屏謂曰能開此乎曰可遂叱之分為三片今號喝石巖遂即剃度名崇慧如長安與方士競法既勝代宗問其師承對曰臣師徑山僧法欽召赴闕賜號曰國一禪師逾年辭歸詔杭州即其庵建寺曰徑山僖宗乾符六年改為乾符鎮國院宋大中祥符元年改賜承天禪院政和七年改徑山能仁禪寺開禧年間孝宗御書額賜徑山興聖萬夀禪寺由宋迄元為禪林之冠元末兵燬洪武間重建歸併于此曰廣化禪寺在縣西十里曰順慶禪寺在縣北三十里曰妙濟禪寺在縣西北四十里曰實際禪寺在縣北二十里曰雲福禪院在縣東北四十里曰圓覺庵圓修庵並在縣東北十五里呉泳撰興聖萬夀禪寺記國家駐蹕臨安自西天目龍翔鳯舞舒岡布麓盤結而為帝王之都者錢塘也自東天目熊騰馬奔凌深拔峭發越而為梵釋之宫者徑山也山以徑名乃天目之徑路其地尊故鬼神不敢宅其境勝故凡庻不得居必也以大法力建大道場然後能儲精㑹秀覧光景而納于其中國一禪師卓錫于此興廢迨今盖四百餘年矣先是慶元已未冬龍王殿灾精廬佛宇一夕而燼僧元聰治故而復新之後三十五年夏再燬無凖範師慨然曰曩在育王時曽夣一神人偉衣冠盛儀衛馳騎而前迎疇昔之夜又夢前神人者持念一寶珠以相授曰謹勿訝或謂夣中之人龍珠之數則火之日也豈住止成壊皆數耶師於是以精進心轉不退輪以勇健力撾無畏鼓披榛塞竅度材于山視昔所植可以為椱為梁為杗為桷者適飽厥用則鳩工聚糧命幹力之僧相其役一念纔起諸天響合上方頒賚甚渥公卿士大夫樂施捨南國之好善者不祈而助貨不命而助力越三年考成曰殿曰堂曰門曰廊曰樓觀棲客之廬齋庖之所庫庾井廐靡不畢具最是龍㳺閣居翠峰之頂畫栱璇題承雲絢日而虛欄之外曰凌霄之閣天空宇逈若與灝氣者游循而下曰寶殿曰寶所曰靈澤殿曰妙莊嚴閣宸奎麗榜殿寶鎮此山寔振古所未有舊兩僧堂㓜學者居外久習者居内殆非不二法門今則統而為一楹七而間九席七十有四而衲千焉翼五鳯而閲離門之虛建萬佛而補艮山之闕皆以大用勝服之若夫乘金相水西秦異僧所云更不道也王在晉游徑山記武林之屬多佳山水而餘杭之有徑山稱最勝東西兩天目山髙挿天水因山曲折浸為巨源若兩目然故曰天目入兩日以是山為徑路山遂以徑名余雅慕徑山而未有企及也嵗在辛亥南湖告成功監司徃閲視余以鞅掌三路不得從諸大夫後㑹八月逾望三日徃吳興謁臺使者畢歸由苕溪苕溪一帶天目諸山衆流環合遡流可達乃從呉興泛舟􅂈德清渡雙溪雙溪之流一出天目一出髙陸至雙溪橋合流入徑山港舟不得通舍舟登陸過化城接待寺化城為故宋佛日禪師宣公所剏踞徑山東麓宋時棟宇宏麗欽錫化城二字上創重屋尊而閣之殿寢門廂庖廪湢浴靡不備具載郎官楊汝明記中我朝香火猶盛漸次廢棄寺田轉佃閭左豪右踞之然化城巷之名不泯馮司成開之創刻經之縁始于清凉之妙德庵地峻逺役匠轉輸工力費倍乃遷之徑山徑山雲霧罩籠藏板其中易朽腐始議復化城化城地坦無雲氣潤濕便藏板而易輸工力乃為屋十間以安經板處工匠而大士金身以草殿居之海内宰官居士布金恢復化城舊域捐資贖地而有子衿鼓衆跋扈必欲與沙門相角事聞當道屬予訊其事郡邑勘明予按法治其尤割地歸僧封畛不失而其間有墓塜者聴之以寧其穸窀佛處蘧廬中得重開法地以須十方大檀越之力予過化城而一二野衲邀入和南佛前稱善事周遭故址枳棘蓁蕪闢草萊而重新法王之宇西來白馬兹其為繙經演法之場乎過化城折而西北抵徑山山去縣五十里䧺據乾位挺然為東目正幹宴坐朝陽天顯堆珠鵬摶凌霄御愛七峯攢擁草朩蓊薆樹古而蒼地僻而野山門幽寂有老松婆娑可䕃十畆與朩蘭交枝薄青旻翳白日松為數千年植而朩蘭亦森發離竒匪深山無此異種參差白塔同虬朩橫斜巢雲歸鶴竹松間雜景色清饒葱翠交睫入山而路轉深地轉奥無數篔簹霏烟濛濛新芊雄㧞妬毋高凌排崗直上各髙十里層巒峻嶺長騫偉觀盤跚逶迤盡在竹間行路籜龍透地躡屐崚嶒一頭陀引導美箭蒙茸蘿葛糾縛時摩僧頂羣峯嶈嶈拱䕶靈嶽中豁平區坦壑去險而夷重巖滴水有洞空沕頭陀指為明月池其間小井為龍湫龍嵗一來顧雷雨曀𡨕過洞行少許路遶屋後登崕㕘大慧禪師塔明堂窒塞方伯吳公言塔前當介然闢之而成路僧苦去屋未果闢由塔崕而東為喝石巖唐時僧法欽結庵有白衣士求法度為沙彌欽指坐後石屏謂曰能開此乎叱之分為三片代宗召法欽赴闕賜號國一禪師辭歸杭即其庵建寺曰徑山宋開禧間孝宗賜額興聖萬夀禪寺東南勝道場無逾此者行過複嶺崇嶐隐天有斐菉猗坎窞為池方塘一鑑湛潔如澄鮮漾碧僧曰放生池池邊刻經工匠排列鴈行伏迎道左已訪澹居上人所寓静室治蔬為供清話移時片言㸃悟此不殊欽公三片石恨不如白衣士立度為沙彌耳别而登樓同餘杭令戴君進飯夕陽西沉遂促從者亟行余時有天目之興徑山直傳舍視之竭蹶而趨至無垢寺而宿焉是夜惺惺不寐取唐崔元翰碑籀文摩擬不能屬草乃讀東坡徑山詩擊節髙吟與松濤林籟相為荅和殘月半窻莽烟伴榻無何而山鳥嗚嗚不覺東方之既白矣呉之鯨徑山紀游庚戌浴佛日久雨乍霽與俞似宗佛石宿禹杭文昌壩亟呼筍輿沿溪行宿霧漸消山頂次第現如新粧出羅幌行可二十里飲溪邊酒家遥望舟枕巍然獨峙秀鬰可挹又三十里林漸深地漸高將逼雙徑循趾攀巘委折數百重澗花飛灑俱成白練山形周環複叠如入谼中上下篠簜檀欒萬晦一色余隨輿偃仰覺日光澹射風細雲疏非若高峰軼雲蒼榦蔽景作鞺鞳之聲䃱磹之状也嶺甫半輿人告疲余顧佛石隔山小浮圖非即歇足處耶佛石指曲磴數坂曰此須遶而上耳既上嶺如馬脊左右懸削忽白雲覆他山飛㨗於鳥細雨隨至余振袂度數盤沐佛聖水杉松環立平臺俯瞰則三山門巋然列矣視小浮圖又在足下逺峰嵣㟐近峰嶢屼含澤吐霓倐忽殊態武林兩髙龕赭一線俱在靉靆中余嗒然宴坐雲海蕩吾心胸覺生平寥廓之氣呼吸相應昔陶貞白志在冲舉每云指白日覩青天去此不逺獨於爾時有㑹巳投松源山房古杉䝉茸方沼沉碧高樓十五楹邃潔可居僧冲宇供笋蕨煨漿不減白墮似宗糾以觴政甚洽月光初燦僅於密樾中作掩映觀耳晨起謁新殿制度宏偉未餙丹堊過妙喜庵禮大慧禪師塔眎龍湫舊蹟循左級而上觀放生池池圓如珪廣可盈晦惜無游鱗潑剌再上為寂照庵刻藏經處鐫工麕集室後供達觀甚肅令人轉思宻藏忽緇衣籜冠過謁余詢知為門人通州崔叔錦為諸生不得意刳心大典棲遯於此兩月矣余擕之出過喝石巗石㭊為三昔中子山人乞國一師剃度以呪力䕶佛法賜號性空大師大厯中代宗遣内侍迎國一入京徑山之興實由於此訪雞二塚至今在岩下三白駒或寢或訛乃載經板出山者儼然雪山梵從也是日隂翳多亷瀐久益宻叔錦别去返松源山樓飯後稍有霽色命輿從右級而上旋轉竹徑菖蒲田新秧離離澗水澄瀉石磴梳潔如鏡高岡礱宻遥見炊烟一縷從修篁中出即知為雲房杳然無覔徑處余喜忘返翛然緱山烟客飡沆瀣佩九節靈苖不復知有人世既過傳衣庵為萬松禪師傳衣處躡白雲庵攀蘿而上為凌霄峰浩淼如大瀛海何減泰岱新殿枕鵬摶山勢拱衛余謂此山幽曠非通都大邑而宸章御蹕後先輝煥故樓名五鳯閣建龍㳺南朝四百八十寺未有其比今山水依然未知八十一代傳燈何人耳返流止亭輿人告息各曳杖尋東坡放生池坡公㳺徑山二詩如欲㸔細字銷殘年靈水先除眼界花俱頌水德今濁甚亭碑幸無剥蝕及讀樓鑰百萬杉松雙徑杳三千樓閣五峰寒自是實境語矣似宗探藏録許為刻髙僧傳燈下各繙一編間拈以問佛石佛石各為宣説吐㫖𤣥暢因曰宗門不立文字而㣲言奥義終古不磨猛志精求㕘悟非逺今人根力未堅而遽稱文喜游戱彷彿而妄冀豐干正恐慧蕋乍枯慈筏罔濟耳相與嗟嘆久之余夙知有聞谷住徑山急欲一晤而聞其坐不語禪殊悵怏佛石為通信聞谷慨然曰吾素所願見者也曉訪之觀音閣時禪習者三十餘人而閣户閴寂鳥雀不喧入左扉若無人者執事䖍嘿惟謹聞谷坐余輩小閣色静而氣融神理泓上發語簡逺真禪定士也余為肅容而别㣲聞谷幾虛徑山一㳺矣蘇轍詩去年渡江愛呉山忽忘蜀道輕秦川錢塘後到山最勝下枕湖水相縈旋坐疑呉㑹無復有扁舟屢到凌深淵今秋復入徑山寺勢壓衆嶺皆迷巔連峰沓嶂不知數重重相挹如青蓮散為雲霧翳星斗聚作潭洞藏蛇蜒欽公未到人跡絶千里受記來安禪荒榛野草置茅舍坐令海賈投金錢至今傳法破煩惱飽食遇客宜安眠觧装投錫不復去紛紛四合投烏鳶或言處此猶未逺海上人少無煩煎天台鴈蕩最深處水秀石瘦尤清便青山獨徃無不可論説好醜徒紛然終當直去無逺近藤鞋竹杖聊窮年方九叙詩雲裏五峰環紫翠空中一徑轉㣲茫黄花漸報重陽節白社遥尋古道場精舍更宜留謝客𤣥都何必訝劉郎髙僧趺化千秋寺獨有靈鷄塜樹蒼湯賔尹訪澹居詩覔友尋師度㑹稽含情千載不能啼閒從國一堂頭過一片香兒吊塜雞㧞天跳地穿黄嶽抱月廻風隐徑山著處盡成香國土单肩赤脚恣周還半月東山水上行薫風南逗晚凉生從君㕘得黄楊朩大好隨縁斷佛情格物何當物格殊子韶妙喜兩糢糊而今賸有關西首劍擊憑誰落畫圖吳用先雨中登徑山與澹居上人夜坐詩喝石開山意若何靈巗千載鬰嵯峨幾盤翠袖穿雲度十里青松帶雨過寶界烟蘿香氣裊珠林鐘磬梵音和清霄喜對支公話把臂中峰一浩謌化城寺在餘杭縣北四十里雙溪之上馮夢禎議復化城䟽引刻經之縁始于清凉之妙德庵地寒而峻逺役南匠轉輸工力費倍功半不得巳而有徑山之遷徑山為東天目正幹五峰攢廻中間佛界我東南勝道場無逾此而雲霧籠罩十日而九藏板其中最易朽腐又不得巳而有化城之議化城踞徑山之東麓去雙溪數里地坦平無雲霧既便藏板而輸工力事事皆宜因故址而新之先為十間屋令足以安經板處工匠而他役徐侯其後似無甚難舉今約同志以十縁倡之縁五十緡禎雖貧勉任一縁夫刻經大役自北而南而其南也又自徑山而化城三徙而後定而任事之人始于宻藏繼予後予而終之者又未卜何人也因縁時節惟佛與佛乃能究盡而自剏縁以至未來凡于此事曽捨一錢半銖及一手一足之力巳上福不唐捐直至成佛而吾等與焉豈不幸甚方伯呉用先重興化城接待寺疏余從紫栢尊者游逾二十載所承鉗鎚錐劄罔所不至通身熱汗不知透出幾畨矣末後以流通佛法付囑不佞唯唯徼天之倖承乏越中即悉心殫力求終刻藏之役兹功巳過半縁成或有日矣乃謀藏板善地卜及化城化城故宋佛日禪師宣公所剏接待寺郎官楊汝明記之甚詳見徑山集中及我朝而香火猶盛漸次凌夷僧徒凋落遂以寺田轉佃於方姓者輾轉相侵盡為居鄰所剥蝕矣然其徑尚存化城巷之名至今在人口今年澹居上人圖恢復之而鄊紳王中泉公首倡義舉願以其地歸寺於是左右聞風者響應乃澹居猶運慈心量其多寡各給其直余與呉下諸君子恊濟之雖未盡復舊址從此誅茅建刹亦庻幾可觀矣然此非今日創議也盖自馮開之司成始矣而余又不知司成之原有此議也一日澹公過予持開之手巻見示謂偶從宻藏棄篋中檢得之余展閲疏引即向時與藏公所謀卜化城以厝經板者也噫竒哉司成徃矣謀于十數載之前而余與澹公成于十數載之後不約而合無心而成九原可作當為鼔掌苐勝地既復梵宇鼎新向後更有許多商量不無藉十方大檀之力余小子亦不敢不賈勇從事使道化重興法輪常轉誓頭目腦髓之不恤而遑恤其他時萬厯辛亥嵗浴佛日大禄寺在縣西北九十里長安鄉晋永康年間建元大德年間重建元末燬洪武二年重建歸併于此曰光教寺在縣北八十里曰靈石院在縣北六十里曰慈相院在縣北一百里靈源院在縣東南十二里安樂鄉舊名龍泉唐咸通七年僧善本建宋治平二年改今額元末燬洪武二年重建歸併于此曰普濟寺在縣東十五里曰寶輪寺在縣東南三里曰澄鑑院在縣東十五里曰光福院在縣東南十五里悟真院在縣西北三十里長安鄉唐咸通八年僧法顯剏宋治平二年改今額元末燬洪武年間重建歸併于此曰石泉寺在縣北八十里曰大智寺在縣東北三十五里曰法華寺在縣西北四十里曰寶幢寺在縣西北六十五里曰寶嚴院在縣北一百二十里曰迎恩院在縣西北四十里曰大安院瑞相院並在縣西北五十里王安石悟真院詩野水縱橫漱屋除午窻殘夢鳥相呼春風日日吹花草山北山南路欲無洞霄宫在縣西南十八里漢元封三年建宫壇于大滌洞前唐𢎞道元年有潘先生者于洞下建天柱觀南向四維壁封三歩禁樵採為長生林中宗時賜觀莊一所後有米法師改觀為北向乾寧二年錢武肅王與閭丘方逺相度山勢復改南向未納土時嘗改天柱宫宋祥符八年陳堯叟奏改今名賜仁和縣田一十五頃并賜鐘磬法具等嵗度行童一人應天慶節設醮以祝聖夀天聖四年詳定天下名山洞府凡二十處洞霄大滌洞為第五政和二年都監何士昭陳乞賜度牒三百道方臘之亂宫燬紹興二十五年重建仍建昊天殿于東廡後殿左陽通明館乾道二年三月夀皇洎顯仁皇太后臨幸嘗以軍士守禦後奏罷以山麓民充佃夫防禦淳祐七年靈濟通真先生孫處道奏請賜錢益市恒産規制愈崇政和間援天柱觀例經尚書禮部給洞霄宫印記慶元二年以嵗久漫㓕重給宋初天聖節道場應本縣文武官僚入山建散諸山僧咸至立班自南渡後惟道士就官建散而縣官止於普救寺行事凡諸宰執大臣丐閒去位者以提舉洞霄宫繫衘咸淳甲戌冬宫燬一空元至元甲申後再新宫宇元末兵燬洪武二十三年重建厯二十餘年而後修垣鉅殿門廡室廬庖庾壇皆次第用完無改舊觀矣王逹記晉許邁稱餘杭山是洞庭西門濳通五嶽山隂至臨安名有金堂玉室仙人芝草左元放之徒漢末諸得道者咸在夫古者採真之士徃徃於名區奥壤穹崖邃壑留連忘返者何哉盖老氏之學貴清静非名區奥壤穹崖邃壑不足以養其髙致故名山大川瓌詭之觀人迹所罕至者必為其徒得之余嘗因邁之言而稽焉餘杭之西有山曰天柱自漢元封三年建天柱觀宋祥符間改稱洞霄宫仙吏謂之福地而天目諸峯遐邇羅列光靈勢氣與造化相為流通蓄竒孕秀莫可殫紀當雲行鳥飛之際一柱中立屹然摩空羣山四靣俯拱自列而宫正踞其幽深峻絶之境丹臺紺殿瓊樓璇室烜赫心目為民禬禳動輙有應元歩日窘四海鼎沸所謂丹臺紺殿瓊樓璇室一燬無遺大明昇天九有寧謐洪武庚午提㸃賈公力以恢復自任夙夜劬勩罄槖是營不三載賈化去副知宫事資深吳公暨希然龔公克紹厥職繚以修垣構以鉅殿至乙未門廡室廬庖庾壇壝次第用完丹臺紺殿瓊樓璇室視昔不異許邁所謂金堂玉室仙人芝草者宛然可徴漢末諸得道者其骨雖朽其神不死安知不與兹山之光靈勢氣相與盤旋於㝠漠之間耶夫置榮悴於兩忘齊天地為一指為道家之常事然數百年之規矱一旦而復之非惟其徒以樂清静無為之教且俾一方萃嚮慕之誠致水旱禬禳之福明靈歆顧祥慶駢臻詎不宻禆皇化為邦氓之利也哉其嗣法弟子周應常劉宗顯慮乎久而泯其績也來京師求余記余喜諸君子能翼其教也姑書此庸刻諸石後有記者尚考于斯陳堯佐詩娟娟紅樹碧峯前為愛桃花入洞天偶逐霓旌纔百歩却憂人世巳經年谷口停驂上翠㣲五雲宫闕闢金扉不知何處朝元㑹却是龍鸞隊仗歸一帆髙掛出紅塵萬仞長歌入紫雲莫道仙游無别侣玉清冠盖許同羣林逋詩大滌山相向華陽路暗通風霜唐碣久草朩漢祠空劍石􅇢花碧丹池水氣紅幽人天柱側茅屋灑松風趙抃詩龍穴藏身隐源泉撫掌清紅塵人絶慮白日世長生我分諳冲寂誰能顧利名夢中休指笑又作洞霄行蘇軾詩前生我巳到杭州到處常如到舊遊更欲洞霄為吏隠一庵閒地且相留趙公碩詩里服蕭蕭入翠㣲虛亭髙敞納晴暉仙歸洞府雲烟冷春入名山笋蕨肥緩引壺觴聊自適暫捐朱墨便忘歸㑹當結屋山中住始悟人間萬事非舊時曽此覔仙縁一别于今四十年白髪重來嗟老矣青山九鎖故依然肩輿直入松間路洗耳還聴澗底泉幽興未䦨吟未就半峰斜日下平川潘良玉詩石壇風冷露華凝羣玉峥嶸簇畫屏水赤久傳丹作井山髙時借翠為亭鶴迎仙馭迷三島雲入洞天朝百靈囘首武陵歸去路碧桃零落晚風清趙汝談詩好閒謝塵事來作名山遊杖䇿西澗曲乞漿東家丘大滌古洞天仙人此藏修至今翠箬下半夜丹光浮山中舊相識置酒為淹留日移雲窻午水滴空林秋授我長生方揮麈談𤣥幽我髪亦巳白赤霄莽何求業縁苦未斷一笑風引舟囘首青天長身名兩悠悠曹元翰詩馬歸清曉破藍田一出紅塵骨巳仙任鎖九重山下路終尋五處洞中天泉流碧砌常鳴玉跡隐蒼崖久蜕蟬人世歸時知變否樵夫猶記爛柯年白駒任詩桃花流水隔塵寰玉樹瓊林九鎖關飛閣太虛開紫府捲簾終日見青山無為自覺心源净學道方知色界閒政滿不湏瞻使節蹇驢瀟灑聴潺湲張輿詩登臨直到翠㣲巔晚向蓬山共醉眠雪後梅花溪影淡月中瑶草露華鮮千年石室琅函秘萬丈天峰玉柱懸此行不為長生訣要續遊仙第二篇趙居仁詩十里溪聲逐澗灣馬蹄聴入洞霄間左旋右折不知路九鎖一開都是山紫極宫髙雲絶頂翠蛟亭壓水當關山中止説吳仙子獨抱真心錬九還此係三十六洞天之一故附載類列慈濟禪寺在縣北六十里善法禪寺在縣東三里安樂塔在縣東三里臨安縣海㑹寺在縣西二里南北鄉梁大同年間賜額竹林寺㑹昌五年燬大中五年重建天福二年錢氏拓舊址建竒石浮圖二座宋大中祥符元年改今額天禧五年燬重建元至正十二年復燬洪武十六年重建歸併于此曰殊勝寺在縣東十里曰靈峰院在縣東十五里曰寶林院在縣東三十里曰法華院在縣西二里曰梵安院在縣西二十里曰精進院在縣西二十里曰勝因院在縣西南三里曰寶積寺在縣西北十里蔡襄海㑹寺記臨安縣海㑹寺梁大同中始作號竹林及五代貞明之初吳越王又新之王縣人也少嘗徃來里中困甚巳而跨有全吳名貴地大私念所從來豈非有隂相者邪竹林最得山水佳處因大治之益廣前制當是時吳中浮屠居雖百千數無是倫者宋大中祥符間例易天下寺名遂賜今額天禧五年冬十月大通夕而墟其徒散去僧有明顧思憮然以興廢為巳務每説於衆曰吾師之法或資於塔廟福報之來稱其所出今殿適謀始而大家力饒不能厚施異時名氏不齒篆載反索氣於後人其可乎於是盛仁俊張從實先輸而倡之從而和者數十百人度林礱石塈茨陛級之役積費錢三千萬役一十年而後已既成列像其下鼓鐘其中㑹而落之墟者復芘而散者復集錢氏以一國之資基之於前有明以一巳之志繼之於後可謂能且勤矣蘇軾詩籃輿三口山中行山中信美少曠平下投黃泉上青𡨕線路每與猿猱争重樓束縛遭澗坑兩股酸痛饑腸鳴北渡飛橋踏彭鏗繚垣百歩如古城大鐘横撞千指迎髙堂延客夜不扄杉槽漆斛江河傾本來無垢洗更輕倒牀鼻息四鄰驚紞如五鼔天未明朩魚呼粥亮且清不聞人聲聞履聲净土禪寺在縣南二里南北鄉五代梁乾化二年吴越王捨基為寺請額光孝明因宋大中祥符元年改今額元末兵燬洪武十五年重建歸併于此曰䕶法院在縣西二十五里曰昭明院在縣西四十五里曰開化禪院在縣南二里曰善住院在縣南五里蘇軾净土寺詩雞鳴發餘杭到寺已亭午㕘禪固未暇飽食良先務平生睡不足急掃清風宇閉門羣動息香篆起烟縷覺來烹石泉紫筍發輕乳晚凉沐浴罷衰髪稀可數浩歌出門去暮色入村塢㣲月半隐山圓荷净瀉露相携石橋上夜與故人語明朝入山房石鏡炯當路昔照熊虎姿今為猿鳥顧興廢何足弔萬世一仰俯又開化禪院詩落日岸葛巾晚風吹羽扇松間野歩稳竹外飛橋轉神功鑿橫嶺巖石得巨片直度千人溝下有㣲流泫崗巒蔚囘合金碧爛明絢􅃡懐異姓王負擔此鄉縣長逢跨下辱屢乞桑間飯誰謂山石頑識此希世彦凛然隂氣逼屹起猶聳戰他年萬騎歸父老恣歡宴錦繡被原野金珠散貧賤竇融既入朝吳芮空記面榮華坐銷歇閲世如郵傳惟有長明燈依然照金殿方九叙昭明院詩勝地傳浮玉前朝此布金龍湫懸雨急鳥路入雲深萬仞鍾靈炁三秋惬賞心塵縁促歸駕囘首戀東林太平萬夀禪院在縣東二十里靈鳯鄉唐天寶三年欽禪師卓錫於此天祐元年吳越王建賜額小徑山太平禪院宋天聖七年改賜今額崇寧元年重建元至正十九年兵燬洪武九年重建歸併于此曰普慶福田寺在縣東北三十里曰蟠龍禪庵在縣西十里曰法海院在縣西二十里陳度徑山下院太平萬夀禪寺莊田記臨安縣東二十里靈鳯山之腰喬木刺天修竹成林中有萬夀禪院者故吳越國武肅王錢氏所建太平寺也宋天祐二年更為禪居天聖七年始賜今額初縣人高君保與其子瞻自景德以來大新棟宇造殿塑像藏經鑄鐘百用具修又以田百有二畆與常住供僧君保瞻卒其子弟分財産欲奪前所予出交訴于縣縣没入之平其估許其市崇寧元年住持等覺大師募檀越百餘人得錢三十七萬有竒詣縣請如夲估市宰君嘉