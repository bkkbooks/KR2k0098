body:
  text: 武林梵志巻六明吳之鯨撰外七縣梵刹海寧縣太平廣福寺在縣東五十里黃岡市唐齊安寺基宋建隆中有僧結茅棲止歴四十年乾德二年額曰太平庵熙寧元年賜今額歸併于此曰慶夀永寧寺在縣東二十四里曰南觀音院在縣東二十一里新江塘南僧𢎞道太平廣福寺詩招提古意饒誰復記前朝五季重開拓三災不動摇珠林花氣合紺殿蘚痕消更上危樓望當門見海潮崇教寺在縣東六十里妙果山之前舊圖經五代成夫人捨園為寺名妙果宋季廢弛元至順四年重建歸併于此曰圓明庵在縣東六十里遊佛墩曰東林庵在縣東六十里真如寺在縣東七十里黃灣菩提山東晉干寶公捨宅為寺周顯德二年建輪藏宋治平二年賜今額歸併于此曰寶嚴寺在縣東六十里曰接濟院在縣東北三十六里曰延聖妙智院在縣東北六十里曰闓濟院在縣東北六十里曰北永寧院在縣北四里曰上方延壽院在縣北十里曰接待朱何庵在縣西一里曰積寶庵在縣西北十五里曰西觀音庵在縣西北二十五里曰雪峰雙桂庵在縣北十八里曰惠照庵正覺庵並在縣東北六十里張諤真如寺詩旗鼓初從海上回天風吹我上雄臺甲披雙朩關西將馬驟羣峰冀北材塵世俯窺飛鳥去軍聲俄逐晚潮來誰人為我書巖石他日重逰掃緑苔真相寺在縣東北六里橫塘北宋寶祐二年建元末燬洪武六年重建歸併于此曰雪峯廣福院在縣東北七里曰净信院在縣東北一十八里崇惠寺在縣東北六十里硤石紫㣲山東麓元至正間建洪武十八年重建歸併於此曰四果華嚴院在縣東北七十里曰勝果院曰圓覺庵並在縣東北六十里西山廣福院在縣東北六十里硤石紫㣲山頂宋天禧五年邑人宋坦捨宅建熙寧元年賜夀聖額隆興元年改今額兵燬元大德間重建歸併于此曰崇福寺在縣東北六十里曰瑞應觀音院在縣東北三十里曰東山廣福院在縣東北六十里曰黃坡庵在縣東北三十里曰永平庵在縣東北五十二里曰興夀庵在縣東北六十里章孝標西山廣福院詩野寺孤峯上危樓聳翠㣲捲簾滄海近洗鉢白雲飛竹影臨經案松花㸃衲衣日斜登望處湖畔一僧歸楊璿崇福寺詩艤棹青山下來尋蘇子家人魚皆静樂水朩亦清華樹老欲成盖菊寒殊未花何須覔勾漏此處有丹砂顧况崇福寺詩家在雙峯蘭若邉數聲清磬發孤烟山連極浦鳥飛盡月上青林人未眠永隆廣福寺在縣西一十里馬牧塘北宋紹興十八年建興廢不一歸併于此曰水陸院在縣西南四十里曰出塵庵在縣西北二十五里金佛寺在縣西一十二里松林舖東宋紹興年間名上乘院乾道間改今額元末燬重建歸併于此曰超王院曰净居院並在縣西五里曰惠明院在縣西八里曰戒壇院在縣西南三里永寧寺在縣西二十里宋嘉泰間建歸併于此曰壽昌院在縣西北五十里薦福寺在縣西三十六里蕭齊永明二年建名安善唐會昌五年廢大中十三年重建宋大中祥符元年改今額元末兵燬洪武初重建歸併于此曰開福寺在縣西三十五里曰觀音聖果寺在縣西北四十五里安國寺在縣西北二百五十歩唐開元元年建名鎮國海昌院㑹昌五年廢大中四年復置名齊豐宋大中祥符元年改今額寺有大悲閣宋理宗御書妙智之閣賜之元至正二年重建歸併于此曰興慶寺在縣北十五里宋蘇軾大悲閣記羊豕以為羞五味以為和秫稻以為酒麯蘖以作之天下之所同也其材同其水火之齊均其寒暖燥濕之一候也而二人為之則美惡不齊豈其所以美者不可以數取歟然古之為方者未嘗遺數也能者即數以得其妙不能者循數以得其略其出一也有能有不能而精麄見焉人見其二也則求精於數外而棄迹以逐妙曰我知酒食之所美也而略其分劑捨其度數以為不在是也而一以意造則其不為人之所嘔棄者寡矣今學者之病亦然天文地理音樂律厯宫廟服器冠婚喪祀之法春秋之所去取禮之所可刑之所禁歴代之所以廢興與其人賢不肖此學者之所宜盡力也曰是皆不足學學其不可傳於書而載于口者子夏曰日知其所亡月無忘其所能可謂好學也巳古之學者其所亡與其所能皆可以一二數而日月見也如今世之學者所亡者果何物而所能者果何事耶孔子曰吾嘗終日不食終夜不寢以思無益不如學也由是觀之廢學而徒思者孔子之所禁而今世之所尚也豈惟吾學者至於為佛者亦然齋戒持律講誦其書而崇飾塔廟此佛之所以日夜教人者也而其徒或者以為齋戒持律不如無心講誦其書不如無言崇飾塔廟不如無為其中無心其口無言其身無為則飽食遊嬉而已矣是為大言以欺佛者也杭州鹽官安國寺僧居則自九嵗出家十年而得惡疾垂死自誓於佛願持律終身且造千手眼觀世音像而誦其名千萬聲病巳而力不給則縮衣節口三十餘年銖積寸絫以迄于成其髙數仞為大屋四重以居之而求文以為記余嘗以斯語告東南之士矣盖僅有從者獨喜則之勤苦從事於有為篤志守節老而不衰異夫為大言以欺佛者故為之記且以風吾黨之士云延恩寺在縣西北二百六十歩舊安國寺藏院宋元祐四年賜今額歸併于此曰慶善寺縣西南二百歩曰常樂寺縣西南二里曰佛牙寺縣北一里曰净明院縣西南八十歩曰正法夀寧院縣西北十五里曰觀音庵縣東北一百五歩東岡廣福寺在縣西北二十五里東晉德法師開山後燬宋乾德元年重建紹興三十二年賜是額永樂十四年潮坍無存十五年移額于四都觀音庵歸併于此曰圓明院在縣西北三十五里覺王寺在縣西北二十五里長安鎮西唐長興四年建名正覺宋治平二年改今額元末兵燬洪武初重建歸併於此曰定香寺在縣西北二十五里曰南禪福嚴院在縣西北四十里曰真如庵在縣西北十五里净妙寺在縣西北三十里宋嘉熙間建元末兵燬洪武初重建歸併于此曰旌忠寺在縣西北二十五里曰雲龍寺在縣西十五里曰惠泉院在縣西北二十五里曰吉慶庵常樂庵雙林庵並在縣北十五里興福寺在縣西北三十里駱家舖東北宋開寶二年建三年賜額歸併于此曰彌陀院在縣西北十五里曰惠明庵在縣西北十五里資勝寺在縣西北四十里晉天福七年建名資夀宋治平二年改今額歸併于此曰報國寺在縣西北四十八里曰資福院在縣西北四十里曰海雲庵在縣西北四十六里吉祥寺在縣西北四十八里許村鋪北名齊明宋建隆二年改名迎祥治平二年改今額元末兵燬歸併于此曰普安寺在縣西四十里菩提寺在縣北内有張子韶讀書臺基存惠力寺在縣東北六十里硤石紫㣲山下晉寧康中尚書張延光捨宅構寺賜額曰志願唐乾元元年勅支本縣税錢修飾唐季兵燬宋乾德間重建大中祥符二年賜今額宋季兵燬元至正二十年重建僧𢎞道遐觀樓詩紫硤山前百尺樓慿髙懸象入㝠搜滄江直到水窮處白鳥忽飛天盡頭一氣鴻濛開禹甸兩峯縹緲接瀛洲胡牀坐對銀河近擬欲乘槎上斗牛净信寺在縣西南六十里晉天福二年僧净建元末兵燬洪武初復建類列定惠寺在縣東北十三里寶林寺在縣西二十里瑞像院在縣北門外二十里白蓮花院在縣東十五里普信院在縣北二里尹墅廣福院在縣西北二十五里西庵在縣西門内大通庵在縣西三里富陽縣法相寺在縣東南三十里麗景村名報恩唐咸通十二年符禪師開山宋大中祥符元年賜額歸併于此曰靈巖院在縣東南三十里曰泗洲庵在縣東南五十里葉士彦題法相寺虛舟亭詩道人亭子號虚舟身與乾坤日夜浮髙檻倚空山疊浪小池承溜雨生漚漁歌響荅穿蓬戸晚飯經行憶舵樓茶竈筆牀安榻畔江湖長任散人逰姜文渭靈巖院詩軒在靈巖第幾峯篔簹遶屋翠重重僧窻滴露全疑雨詩榻生凉半是風四座緑隂侵戸暗一簾爽氣撲衣濃信知石上蒼苔合多為逰人去後封净居寺在縣南四十里大源村石晉天福八年名净福宋治平二年改今額宋末燬元至順間重建歸併于此曰崇善院在縣南四十里曰真如院在縣東南一百二十里曰禪寂院在縣南八十里偃松寺在縣西南十里馴雉村宋嘉泰四年建前有大松盤䕶因名元末燬惟殿宇及法堂存歸併于此曰永樂吉祥寺在縣東北小隠山曰净土院在縣西南三十里曰靈巖寶山院在縣西十里曰大智院在縣西二十五里曰法雲院在縣西二十五里曰普惠院在縣西三十里曰真寂院在縣西南三十五里姚愈題净土院竹軒詩勁節摩雲嵗月深冰霜不改舊時隂静浮香篆度幽逕冷滴翠光生茂林明月滿窓橫妙墨清風入指按黃金箇中領取西方意夢落人間何處尋能仁寺在縣西南十里太平村唐天成元年建名雲霄宋咸淳元年請今額元至正丙申兵燹洪武初重建歸併于此曰法門寺在縣東一十五里曰三學院真如院並在縣西南三十里曰寶林院在縣西南三十五里曰崇福庵在縣西南二十里李鞉三學院詩逺岫朝來更爽孤雲徙倚長閒飛出偶成霖雨歸來依舊青山寶林院巖香閣詩花到清明際随春渡虎溪勾牽朩芍藥流落古招提獨喜孤芳在何妨衆草齊定知妃子意不觧謫仙題寶相寺在縣西南三十五里慶䕶村洪武初創庵曰浦西十三年請移㸔潮村寶相寺額歸併于此曰寂光普照禪寺在縣西四十五里曰報恩禪院在縣西南八十五里妙智寺在縣西南五十里善政村永安山之陽唐太和元年僧㑹遇建舊名驪峰錢武肅時改名永安宋大中祥符元年改今額宣和間方臘之亂燬建炎四年邑人提刑李鞉施財新之歸併于此曰妙巖院在縣西南三十五里曰萬春院在縣西八十里楊廉夫贈妙智寺仁一初詩一初闍黎諸法觧吹得道人雙劒簫大道不如宗北秀㸔山直欲盡南條探官時着楊梅㡌勸客醉傾椰子瓢輕拂鞭稍踏春雨紫騮嘶過聖安橋慈修䕶聖禪寺在縣西五十歩唐大中間建名保寧元至順間改今額元末兵燬洪武元年重建歸併於此曰西巖寺在縣北三十里曰浄明院在縣北五里曰蓮堂庵在縣東南四十曰里普潤庵在縣西南五十里曰通濟庵在縣南五里曰悟空庵在縣東北十五里曰大明院在縣西北四里曰净覺院在縣西五十歩白居易西巖寺詩千古仙居物象饒道成丹熟晝昇霄巖前寶鏡傳松韻洞口靈池應海潮崖折百花遲日晚鶴歸清夜唳聲遥登臨漸到希夷境平拂行雲度石橋楊廉夫西巖寺詩何代仙人跨鶴歸至今丹竈倚柴扉黃金布地開華藏白石撑空障翠㣲海内甲兵民厭久山中車馬客來稀僧窻轉午渾無事晴雪風鏖朩葉飛李白净明院詩天台國清寺天下為四絶今到普照逰到來復何别柟朩白雲飛髙僧頂殘雪門前一條水幾回流嵗月蘇軾净明院詩富春真古邑此寺亦唐餘鶴老依喬朩龍歸䕶賜書連筒春水逺出谷曉鐘踈欲繼江潮韵何人為起予大明院詩長松吟風晚雨細東庵半掩西庵閉山行盡日不逢人裛裛野梅香入袂居僧笑我戀清景自厭山深出無計我雖愛山亦自笑獨徃神傷後難繼不如西湖飲美酒紅杏碧桃香覆髻作詩寄謝採薇翁本不避人那避世永寧寺在縣西一百五十歩坊郭梁大同三年建名榮國宋大中祥符元年改今額嘉定壬申縣令程珌新之元末兵燬洪武九年重建歸併于此曰真覺院在縣東五十歩曰净因院在縣東二十里曰净土院在縣西二十里曰長福羅漢院在縣北十二里曰大安院瑞相院並在縣西北十八里曰慶恩院在縣北十八里曰資聖院在縣北十八里曰慈雲院在縣北二十五里曰華盖仙山院在縣東北十二里楊亷夫真覺院詩禺陵雲氣近松翠䕶禪闗只有客常到不如僧最閒春風浙江水夜雨富春山愛此清居趣長歌日暮還蘇軾净因院竹軒詩前