云老子説云欲度南極避水災天目海陵最為第一太平寰宇記云山高三千九百丈廣五百五十里水因山曲折東西巨源若目故云天目東出臨安為大溪溢東流而為苕溪西趨於潛為紫溪合桐廬之水以滙於浙江委巷叢談云杭州山脉發自天目有東有西東目之脉萃于餘杭結局于徑山西目之脉萃于錢塘結局于西湖故天目者杭之主山也王氣鬰葱帝王奠宅而錢氏偏霸宋室南遷兆不誣矣陶潛問來使詩爾從山中來早晚發天目我屋南窻下今生幾叢菊薔薇葉巳抽秋蘭氣猶馥歸去來山中山中酒應熟張羽登天目山詩東西峰對峙麋鹿日成羣四月猶飛雪半山長是雲洞香仙藥遍天黒聖燈分千古錢塘勝登臨愜素聞王在晉秋日登天目詩莽氣飛揚不見山翠磐髙聳水流潺煉將青白雲和碧㸃就紅黃葉作斑江海襟期開地局昊天眉宇出塵寰𤣥穹咫尺開閶闔吾亦翹瞻望玉顔章嘉楨謁昭明庵詩禪林天下稱蕭寺惟有兹庵真姓蕭地以分經成凈土池開洗眼在清霄層嵐叠巘圍寒翠竹韻松風共寂寥見説讀書臺幾處離離荒草野烟飄西天目山獅子正宗禪寺今稱獅子林去於潛北三十里而雙清莊居其麓莊右出太子庵掬泉洗目漱之而甘沿澗登響水巖初得竒壁前望巨石如覆舟至則如削成而方繡蘿盖之名觀音巖左通活埋道循右穿眠牛亭古朩盤鬰踰半山橋有寶樹三株與東目垂虹堪頡頏上真際亭則高麗王問法中峰所自署者登獅子岩藏蜕在口吻間秉燭始見複閣飛樓若凌虛而滅其趾曰舫室曰死闗高峰所自命右抱象鼻水淙淙下者曰千丈崖越閣道行萬松間得玉柱峯中立夷曠高不及十丈而磊砢輪囷蒼古異常上覆兩松如擁華盖東為巾峰斷崖二塔一杉五枝一杉雙榦俱大五六圍而五枝者在斷崖塔凌髙阜尚埋其根而雙榦修挺入雲居然娑羅雙樹其下平行地即為正宗禪寺榜曰獅子林旁為幻住庵中雲庵稍上為貝林禪師華嚴庵繞屏風石踰金仙頂觀怪石斷者截者反者䜿者若片片解而庋積於築室之場計其高與東目肩齊下瞰惟西南蓮華峰幽勝返幻住㳂石壁為西方庵過天關為立玉亭危道如線趾半垂在外委蛇以行真若羊腸從立玉望西方半没雲嵐中由西方庵峭壁中裂如隧道曰龍門從龍門下若霣虛山中之竒無以加此分徑北行美隂曲折漸露幻居之崖層構翼接觀益竒憩活埋庵陟香罏峯頂下㳂觀音石凡所經高峰銅鉢繭衲如熏優鉢羅花開及中峯自題畫像皆世所未有烟雲萬變必身至始能領略云白樂天新婦石詩堂堂不語望夫君四畔無居石作隣蟬鬢不梳千載髻蛾眉長掃萬年春雪為鈆粉憑風傅霞作臙脂仗日勻莫道岩前無寶鏡月明依舊照夫人僧靈一天池詩昨夜雲生天井東春山一雨幾囘風林花迸逐溪流去欲上龍山道不通蘇軾雷神宅詩巳外浮名更外身區區雷雨若為神山頭只作嬰兒語無限人間失箸人高峯禪師題鶴山詩一山髙突兀百里去城闉老翠掛清曉華滋積富春江空潮勢逺雲破月痕新對此忘情者林間有幾人中峰禪師真際亭詩高亭結構標真際體共雲林一様閒山勢倚天忘突兀水聲投澗自潺湲伽陀迥出言詞外海印高懸宇宙間佇㸔凭欄人獨醒又添公案入禪關幻住庵歌幻住庵中藏幻質諸幻因縁皆幻入幻衣幻食資幻命幻覺幻禪消幻識六牎含裹幻法界幻有幻空依幻立幻住主人行復坐静㸔幻華生幻果放還收控勒幻繩幻騎牛時或住入萬幻塵俱揑聚時或眠一覺寧夢居四禪有時動幻海波翻幻山聳有時静幻化光中消幻影可中時有幻菩薩來叩幻人詢幻法我幻汝幻幻無端幻生幻死幻涅槃净名室内龜毛拂龍女掌中泥彈丸更有一則幻公案幻証幻修須了辨莫言了辨幻云無只此無無名亦幻學人未達真幻輸動輒身心自相反幻心瞥爾生幻魔幻翳忽然遮幻眼陽燄空華乾闢城天堂地獄菩提名有問此幻從何起雲月溪山自相委要見庵中幻主人認著依前還不是吳用先贈貝林上人詩絶頂空山寂惟將貝葉翻梵書窮本末宻呪演朝昬世法了無染禪心終不言孤雲時獨徃流水䕶柴門王在晉乘夜登法雲塔詩翠屏團裹勢嶙峋薄暮登臨不待晨樹杪飛泉分雨露峰頭明炬動星辰中峯塔下鐘初動立玉亭前酒一廵歸路巳迷荒草合雲房深迥漏聲頻喬雲將天目志成呈徐明府并序夫鈆刀不與霄影争銛駑馬不與黄騟方駕矧章縫之下士當冠劍之鉅公徐使君威鳯祥麟白眉先喆牛溲馬勃青眼後生分璧潛州已最書屛之業探竒禹穴雅意名山之藏因天目之䧺峰成公餘之新志涔蹄末學謬分編檢之榮琬琰宏詞不數巴渝之響聊抒短什奉和雄篇平生不識天目山平生不識使君顔山耶君耶両争勝使我夣寐青巖間越中千嶂縈江碧兹山獨髙八千尺日暖花飛古院紅雨晴泉掃隂崖白無峰不幻作蛟螭雲月烟霞紛繪竒客度松壇皆馭鯉僧歸瑶殿總馴獅憐予三載西湖客三載何曾理山屐終年鎻閣擁寒紗一杯湖水如環璧使君新記來飛鴻開椷翠巘如巃嵸依稀海蜃吐朝閣彷彿江猿唫夜風此時矯首情無巳坐巻雲蘿落窻几試令兼誦使君詩龍宫網割珊瑚紫世間好事争紜紜携杖思穿麋鹿羣囊中但寶一編在只此見山兼見君潘之恒兩天目論曰兩天目祖黄山而表三吳如縣鑑在上故稱天目或舉江南全體黃山為首天目為目五湖為臓腑金焦為足語雖太竒亦頗足據舊志言兩山絶頂俱有池一泓如天之兩目此學究訓觧何所從來即昭明洗眼池亦出俗諺其池不盈二尺東在廻光庵西在太子庵各祠昭明具王者冕服張崔兩相翼之皆能錫福於民者標以雙清莊近似若據此為天目何鄙如之又西頂有石如青蓮開敷東西二頂累石纍纍亦状青蓮楞嚴經謂青蓮花目亦在佛面則寧以此受名猶嫌著相安有他説可易此者也其兩頂葢石如板可謂竒蹟至傅㑹仙人造梁無乃河漢而淺于鵲橋乎如果上真遨遊兩峯間呼吸可通帝座無煩五丁為伐持地為平此可勿論矣天台傳教庵在瓶窑妙峰真覺法師閲天台教觀處師苦心台教三十餘年所註經甚多塔于天台髙明寺側新城縣普照院在縣東十五里晉天福七年建名普光院宋治平二年改今額歸併于此曰多福院在縣治東半里曰總持院在縣北十里曰净嚴院在縣西三十五里曰明寂院在縣西七十里曰萬壽庵在縣南七里李浙普照院詩青山遶屋嵐光重流水衝階碧蘚滋獨坐午窻誰晤語鷓鴣聲裏竹隂移東白院距縣一里許在鷄鳴山昔為唐給事中昭諫羅隠公宅溪流繞前山巒環後邑人共建為東白禪院江西益王賜額院前溪水一帶向為放生池久廢萬厯間邑令王巨槐命僧海金立石刻禁仍復其舊一時士民贖生至紛紛中有大士堂福民侯王祠祠之左為昭諌公遺像鄉民嵗時伏臘于此每東顧上流又有許忠烈祠耿然並峙東安彈丸區也如羅之文章許之忠烈並可昭垂不朽題詠幾遍獨東海冒愈昌撫吊凄楚堪為二公擊節今録之云千載人傳昭諫名空山無處覔先生已知霧豹南山隠恍聴天鷄半夜鳴遶砌薜蘿堪製服近簷花栁共為情睢陽祠宇還鄰近忠義何當共一楹凌誌題云題山詠水遍天涯誰識東安是舊家半畆荒基山寂寂夜深風雨落梅花許廣淵詩云廢宅百年後荒基一畆平獨憐新檜栢誰識舊軒楹閭里清風在溪山秀色明當時苦吟夜應使鬼神驚黒山蟠龍庵山在平地中陡然奮起仰視竒絶逶迤而上數百歩許有崖兩石峰相對徑甚狹且迅再數十武復開見平地田地塘井可數十畆四逼山崗廻遶上見青天中有龍池半畆許大旱不涸有禱輒應常有祥雲覆其上逺方望氣者徃徃登陟觀閲皆以為瑞謂小麻姑洞也有大石二一名伏虎石在洞口儼然虎踞扣之有聲每天將雨輒潤登據俯眺可閲百里山水盡環遶拜舞于下一名棋枰石在前崗寛廣平直相傅葛仙翁與客對局在此臘月山花盡開至今惟此山巔有蘭花映山紅十二月即開中有泉水一孔冬夏不涸清冽異常昔有異僧來此跏趺數月不食烟火去之時曾題壁間有俊毫千管秀翰墨一泓香松篁間竹韵另是一乾坤之句元時燬國朝僧智果募邑人潘檑鼎建有觀音堂文昌祠怡性軒外有亭名最髙處人皆稱為真佛地昔蘇文忠姚次庵遊厯有韻明邑令林劍台以棹楔題贈至鄞入高明洲粤人張兢餘西吳蔡五嶽各有題詠其上咽水洞距縣三十里為廣陵村平坂中一山突出皆頑石前有一小洞洞口可容十數人站立人不問洞内外寂如也惟人向洞揖曰某來此要求仙官恩澤其洞内即閧閧作聲須臾水即向洞口濆出蝦魚亦隨水而出跳躍水中直竢伊人再揖曰水足矣洞内即劃然有聲其水與蝦魚復返洞口儻再請如前洞之出納亦如前雖百請亦百應也鄉人每嵗致祭洞外田疇千畆皆頼此灌溉無旱涸之虞昔有縣令范君者曾徃觀鳴鑼放炮至洞口作禮水不時出范留宿次早復請復不出范怒敺里胥言誣夜復宿中堂寺夢數老人皓髪黃衣行止翩翩叩門請見范與之坐問曰公何人斯老人曰予秦人也避亂於此向不習漢官威儀畏聞車馬擁呼聲長官何必恚報者倘不信姑試之次早屏騶從至洞口感騐如常范乃驚異為之題記刻石而返夫桃源記人疑其幻兹洞以水為吞吐自秦至今靈應不絶無能測其從來亦竒哉惜在深山盤谷中不獲標名宇内然觀邑令一夢又以無名為貴矣寶勝院唐天寶間建為魚池寺宋祥符元年改今額有葛仙翁煉丹井曰乳泉其白如乳許仲蔚詩青雲路在天煉鼎亦徒然九轉果何物一泓空舊泉競知丹可煑不悟骨非仙汲引殊無状翻嗤葛稚川許廣淵詩葛公高隠處鑿井碧山前鍊就長生藥空餘白乳泉鼎藏今去水氣吐舊成烟午夜風雷作人疑羽珮旋寶乘寺唐上元二年建為靈逺寺初梓州刺史羅石朔掘地得銅鑄佛像俄失所在而新城人獲之野因建寺焉今有佛嶺由此也㑹昌中廢大中十三年復置為聖像寺吳越王迎其像入城宋大中祥符元年改今額有脱龍洞躍龍池噓雲亭妙香堂深静堂大唐開山祖師名休糧白居易贈詩云三十餘年坐對山只將無事化人間齋時徃徃聞鐘笑一食何如不食閒司馬槱遊脫龍洞詩云雷雨何如起蟄龍蒼痕夭矯石巖空不縁嗜好尋劉累定向人間試葉公錢朝隠鐫脱龍洞詩云凢骨何年脱洞巖真龍肯向此中蟠料應夜半凌空去雷震千山風雨寒李處全題深静堂詩云鼎來朱墨苦難逃兩夕山中暫釋勞野岫擁簷青嶻􅑖㢠廻塘足雨緑週遭繙經深院心宜静逺跡紅塵意自高謾把新篇供寫物么麽那敢説詩豪葉衡題妙香堂詩云巍巍畫棟挿晴空時有芳馨四面通好為高禪叅鼻觀未應公子鬭熏籠簾前一炷沉檀韻窻外數番蘭蕙風信道杜陵佳句在心清渾賦此堂中寧國寺在縣南七里青巒山晉郭文舉常隠于此夜有虎為一金􅁫梗喉俯地作求救状郭探手去之虎摇尾㢠廻拜再三次早啓扉則有一死麋乃虎所啣置門外者咸和二年人為立祠禱祈必應晉天福八年吳越王因碧沼清澈遂命額曰碧沼寺潘閬詩五峯髙挿雲居勝覽景留題趣味長碧樹葉隂山骨潤白蓮花馥水池香鶴尋巢徑松千盖僧卧溪流石一牀閒翫不知西日落馬蹄歸去帶斜陽王圻詩髙僧居處足清虛泉遶堦庭樹遶廬鬰宻青巒垂薜荔渟湛碧沼映芙蕖客來尚喜紅塵隔僧住應知與世殊猶感支郎碧雲句使人繁慮頓然除牛仙客詩歩歩穿蘿入徑幽栢高松老幾人遊花開花落非僧事自有清流對碧流裴極詩一沼光涵四座寒夕陽囘首更凭欄慿師蚤把香蓮種他日期來結社㸔杜茍鶴詩山半一山寺野人秋日登就中偏愛日獨上最高層有果猿摇樹無齋鴿㸔僧僧門日多事來此復何能方干詩深僻孤高無四鄰白雲明月自相親海中日出山先曉世上寒輕谷未春窻逼野溪聞唳鶴林通村徑見樵人此時惟有雷居士不厭籃輿去住頻林杜詩幽谷泉聲冷鳥啼僧定深好花叢古砌寒瀑發高岑遊者陸鴻漸居人支道林欲辭青嶂去臨去復成吟釋智圓詩一到無塵境相留静話長秋聲歸古朩月色滿空廊嵐氣侵衣潤溪泉漱齒凉終期整瓶錫來此掩閒房邵輶詩地勝千嵓秀名高萬古存丹崖紀靈躅紺宇蔽祗園樹老垂藤影池幽浸蘚痕會心多興趣随意坐林樊劉大綱詩夜色清無滓虛凉月滿亭螢飛時度竹魚躍乍翻萍冉冉雲歸盡霏霏露欲零劇談渾得趣相對兩忘形類列福光寺在縣北十五里多福禪院在縣西七十縣安隠院在縣西三十里瑞相院在縣西七十里通靈塔在縣北二里多寶塔在縣西五十里筆峰塔在獅子山於潛縣獅子正宗禪寺去縣北四十五里嘉德後鄉天目山有獅子巖林洞幽深松石竒怪元至元十六年建延祐七年賜額後燬洪武九年重建歸併于此曰大覺正宗禪寺在縣北四十里曰善法禪寺在餘杭縣東南三里寂照教寺去縣南二里豐谷鄉舊名吳興唐大中五年改今額宋隆興初邑令葉衡重建寶慶初避御名改為此君軒元末燬洪武初重建歸併于此曰明智寺在縣西十八里曰治平寺在縣北十里曰常樂寺在縣南五十里曰布金院在縣東二十里曰廣覺院在縣東二十五里曰三學院在縣南十五里曰悟真院在縣南三十里曰净勝院在縣南六十里曰妙樂院在縣北七里曰廣慈院在縣北四十里曰褒忠院在縣北四十里曰崇法院在縣西南三十里昌化縣治平寺在縣西一里舊名忻平唐大中二年建開平二年改今額元末兵燬洪武十五年重建歸併于此曰法㑹寺在縣南三十里曰大明慧照寺在縣西八十里曰普濟寺在縣西七十里曰千頃龍興寺在縣西北六十里曰普向院在縣南五十里曰百丈廣福院在縣西二十里曰法興院在縣西四十里曰鷲峰院在縣西五十三里吳珩法會寺詩地占金山勝泉分銀漢流杉篁能䕶翠猿鶴似驚秋祗憶登臨晚寧辭取次游列峯饒逺秀不惜上髙樓蘇子由送無畏還慧照寺詩身老與世踈但有世外縁五年客江西歸帆謝徃還依依二三老示我馬祖禪身心忽明廣不受垢汙纒偶成江東游欲别空凄然縁散衆亦去飄若風中烟華陽本荒邑緇素明星懸偶然得老尉舊依育王仙璉公善知識不見十九年我昔未聞道問所以入門告我從信入授我青眼篇冉冉百尺松起自一寸根南歸髪盡白尺書今始傳不知鄰邑中乃有門人賢百里走相訪觸熱汗雨翻懐中出詩巻清絶如斷絃我適病寒熱氣力纔綿綿空齋黙相向欲語不能宣未暇答佳意歸錫鏘金環空有維摩病媿無維摩言類列明因院在縣東三十里福全院在縣東北五里清修院在縣南四里澄寂院在縣南二十八里南塔在縣東南青山之麓今院燬而塔猶存武林梵志巻六
